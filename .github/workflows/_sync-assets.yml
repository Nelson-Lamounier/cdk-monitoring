# =============================================================================
# Reusable Workflow: Sync Static Assets
# =============================================================================
#
# Extracts Next.js static assets from a Docker image artifact built in a
# previous job, syncs them to S3, and invalidates the CloudFront cache.
#
# This workflow runs from the cdk-monitoring repo. The sync-static-to-s3.ts
# script and its dependencies (scripts/lib/*) live here alongside the CDK
# infrastructure that defines the S3 bucket and CloudFront distribution.
#
# Prerequisites:
#   - A prior job must upload a Docker image artifact named
#     "docker-image-<environment>" containing a docker-image.tar file
#   - AWS OIDC role must have permissions for S3, CloudFront, SSM, STS
# =============================================================================

name: Sync Static Assets (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (development, staging, production)"
        required: true
        type: string
    secrets:
      AWS_OIDC_ROLE:
        required: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  NODE_VERSION: "22"

jobs:
  sync:
    name: Sync Assets & Invalidate Cache
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout cdk-monitoring (this repo — owns the sync script)
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. AWS Credentials
      # ------------------------------------------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      # ------------------------------------------------------------------
      # 3. Download & extract static assets from the Docker image artifact
      # ------------------------------------------------------------------
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.environment }}
          path: /tmp

      - name: Extract Static Assets from Docker Image
        run: |
          echo "Loading Docker image..."
          docker load -i /tmp/docker-image.tar

          echo "Extracting static assets..."
          TEMP_CONTAINER=$(docker create frontend:latest)

          mkdir -p .next
          if ! docker cp "$TEMP_CONTAINER:/app/.next/static" ".next/"; then
            echo "[FAIL] Failed to extract static assets"
            docker rm "$TEMP_CONTAINER" > /dev/null 2>&1 || true
            exit 1
          fi
          docker rm "$TEMP_CONTAINER" > /dev/null

          ASSET_COUNT=$(find .next/static -type f | wc -l | tr -d ' ')
          echo "[PASS] Extracted $ASSET_COUNT static assets"

      # ------------------------------------------------------------------
      # 4. Install dependencies & run sync script
      # ------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Sync to S3 & Invalidate CloudFront
        run: |
          npx tsx scripts/sync-static-to-s3.ts \
            --env "${{ inputs.environment }}" \
            --region "${{ env.AWS_REGION }}"

      # ------------------------------------------------------------------
      # 5. Summary
      # ------------------------------------------------------------------
      - name: Sync Summary
        run: |
          echo "## Static Assets Synced" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Assets synced to S3**" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront invalidation created**" >> $GITHUB_STEP_SUMMARY
