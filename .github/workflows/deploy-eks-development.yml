# @format
# Deploy EKS to Development.
#
# Trigger: push to main touching any EKS-relevant path, or workflow_dispatch.
# Branching model: feature/* → PR → develop → PR → main → this workflow.
# Spec: docs/superpowers/specs/2026-05-05-eks-migration-design.md § 9.2
#
# Path strategy — any change under these trees causes a deploy:
#   infra/lib/stacks/kubernetes/**  — CDK EKS stack definitions
#   infra/lib/config/eks/**         — EKS-specific config (cluster, nodegroup, addons)
#   infra/lib/projects/kubernetes/** — kubernetes project factory (instantiates stacks)
#   infra/lib/constructs/**          — shared CDK constructs imported by EKS stacks
#   infra/lib/factories/**           — shared project-registry / factory base
#   infra/lib/utilities/**           — shared utilities imported by EKS stacks
#   infra/lib/shared/**              — shared VPC / base constructs
#   infra/bin/app.ts                 — CDK entry point (stack assembly root)
#   .github/workflows/deploy-eks-development.yml  — this file
#   .github/workflows/_deploy-eks.yml             — reusable deploy workflow
#   .github/actions/**               — shared composite actions used by all pipelines
#
# Security: this workflow only consumes inputs.*, vars.*, secrets.*,
# and github.event_name — no attacker-controlled free-text is interpolated
# into shell.

name: Deploy EKS to Development

on:
  push:
    branches:
      - main
    paths:
      - "infra/lib/stacks/kubernetes/**"
      - "infra/lib/config/eks/**"
      - "infra/lib/projects/kubernetes/**"
      - "infra/lib/constructs/**"
      - "infra/lib/factories/**"
      - "infra/lib/utilities/**"
      - "infra/lib/shared/**"
      - "infra/bin/app.ts"
      - ".github/workflows/deploy-eks-development.yml"
      - ".github/workflows/_deploy-eks.yml"
      - ".github/actions/**"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-eks-development
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    uses: ./.github/workflows/_deploy-eks.yml
    with:
      environment: development
      cdk-environment: development
      require-approval: never
    secrets: inherit
