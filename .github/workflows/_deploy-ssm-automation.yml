# @format
# @description Reusable SSM Bootstrap Workflow
#
# ─── Purpose ───────────────────────────────────────────────────────
# Bootstrap-only pipeline. Syncs scripts to S3, triggers SM-A (Bootstrap
# Orchestrator) on existing EC2 nodes, then delegates app config injection
# and verification to _post-bootstrap-config.yml (which calls SM-B).
#
# Does NOT deploy any CDK stacks — all infrastructure (including the
# SsmAutomation stack with both SM-A and SM-B) is deployed by _deploy-kubernetes.yml.
#
# ─── Two-Pipeline Architecture ─────────────────────────────────────
#
#   Pipeline 1: _deploy-kubernetes.yml
#     - Deploys ALL CDK stacks: networking, compute, IAM, API, edge,
#       AND SsmAutomation (SM-A + SM-B + EventBridge + IAM roles)
#
#   Pipeline 2: _deploy-ssm-automation.yml (this file)
#     - Phase 1:  Writes admin IPs to SSM Parameter Store
#     - Phase 1b: Seeds CloudFront origin secret (idempotent)
#     - Phase 2:  Syncs bootstrap + deploy scripts to S3
#     - Phase 3:  Verifies S3 artefacts landed (file counts per prefix)
#     - Phase 4:  Triggers SM-A (Bootstrap Orchestrator) via trigger-bootstrap.ts
#     - Phase 5:  Verifies SM-A execution targeting + instance health
#     - Phase 6:  SM-B (Config Orchestrator) injects app secrets + verify
#
# ─── Two-State-Machine Architecture ─────────────────────────────────
#
#   SM-A (Bootstrap Orchestrator) — cluster infrastructure
#     Manages: control-plane bootstrap + worker re-join
#     Started by: this pipeline (Phase 4) via trigger-bootstrap.ts
#     On SUCCEED: EventBridge automatically fires SM-B (self-healing)
#
#   SM-B (Config Orchestrator) — application runtime config
#     Manages: 6 deploy.py scripts → K8s Secrets + ConfigMaps + IngressRoutes
#     Started by: EventBridge ONLY (auto after SM-A SUCCEED — self-healing)
#                 OR deploy-post-bootstrap.yml (manual standalone)
#     NOT started by this pipeline: admin-api + public-api are applied by
#     deploy-api.yml (k8s-runner, direct). All 6 services covered on node
#     replacement via EventBridge.
#
# ─── Job Flow ───────────────────────────────────────────────────
#   sync-and-verify (always) → trigger-bootstrap (SM-A, if input=true) → verify-ssm-automation
#
#   1. sync-and-verify     - S3 sync (ALWAYS — no trigger-bootstrap gate) + artefact verify
#   2. trigger-bootstrap   - Resolves instance IDs, starts SM-A (if trigger-bootstrap=true)
#   3. verify-ssm-automation - Instance targeting + health integration tests
#
#   SM-B is intentionally NOT called here. It fires via EventBridge when SM-A succeeds.
#   For manual SM-B execution, use deploy-post-bootstrap.yml.
#
# ─── How Instance Discovery Works ─────────────────────────────
# EC2 user data publishes instance IDs to SSM parameters on boot:
#   - /k8s/<env>/bootstrap/control-plane-instance-id
#   - /k8s/<env>/bootstrap/app-worker-instance-id
#   - /k8s/<env>/bootstrap/mon-worker-instance-id
#
# trigger-bootstrap.ts reads these to target SM-A. If a parameter
# is missing, that node role is skipped (not yet deployed).
# SM-B reads /bootstrap/control-plane-instance-id internally —
# no instance ID is required in the trigger-config.ts call.
#
# ─── Day-2+ Updates ───────────────────────────────────────────────
# To update secrets only (without bootstrap), use deploy-post-bootstrap.yml.

name: Deploy SSM Automation (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (development, staging, production)"
        required: true
        type: string
      cdk-environment:
        description: "CDK environment name (used by secrets and verify steps)"
        required: true
        type: string
      trigger-bootstrap:
        description: "Trigger SSM Automation on nodes"
        required: false
        default: true
        type: boolean
    secrets:
      AWS_OIDC_ROLE:
        description: "AWS OIDC role ARN"
        required: false
      ALLOW_IPV4:
        description: "IPv4 CIDR for Traefik admin-ip-allowlist (Grafana/Prometheus/ArgoCD)"
        required: false
      ALLOW_IPV6:
        description: "IPv6 CIDR for Traefik admin-ip-allowlist (Grafana/Prometheus/ArgoCD)"
        required: false

permissions:
  id-token: write        # Required for OIDC → aws-actions/configure-aws-credentials
  contents: read         # Required for actions/checkout

env:
  NODE_VERSION: "22"
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}


jobs:
  # ===========================================================================
  # Phase 1–3: Sync Bootstrap Scripts to S3 + Verify Artefacts
  #
  # Ensures latest Python step scripts are in S3 before triggering.
  # SSM Automation downloads these before each step execution.
  #
  # Steps:
  #   1. Write Admin IPs to SSM  — ensures Traefik allowlists are current
  #   2. Sync Scripts to S3      — k8s-bootstrap/ + app-deploy/ targets
  #   3. Verify S3 Artefacts     — integration test: bucket exists + file counts
  # ===========================================================================
  sync-and-verify:
    name: "S3 Sync & Verify Artefacts"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      # -----------------------------------------------------------------------
      # Phase 1 — Write Admin IPs to SSM Parameter Store
      #
      # bootstrap_argocd.py (Step 5b) reads these paths to inject
      # adminAccess.allowedIps into the monitoring ArgoCD Application
      # via Helm parameter overrides, populating the admin-ip-allowlist
      # Traefik Middleware. Without this, the middleware renders with an
      # empty sourceRange and Traefik returns 403 for all
      # Grafana/Prometheus/ArgoCD requests.
      #
      # The Data stack CDK deploy also writes these (Fix A), but this step
      # ensures the SSM params are current on script-only re-bootstraps.
      # -----------------------------------------------------------------------
      - name: "Phase 1 — Write Admin IPs to SSM"
        env:
          ALLOW_IPV4: ${{ secrets.ALLOW_IPV4 }}
          ALLOW_IPV6: ${{ secrets.ALLOW_IPV6 }}
        run: |
          SSM_PREFIX="/k8s/${{ inputs.cdk-environment }}/monitoring"
          REGION="${{ env.AWS_REGION }}"

          if [ -n "$ALLOW_IPV4" ]; then
            aws ssm put-parameter \
              --name "${SSM_PREFIX}/allow-ipv4" \
              --value "$ALLOW_IPV4" \
              --type String \
              --overwrite \
              --region "$REGION"
            echo "[OK] IPv4 allowlist written to SSM"
          else
            echo "[SKIP] ALLOW_IPV4 not set — skipping"
          fi

          if [ -n "$ALLOW_IPV6" ]; then
            aws ssm put-parameter \
              --name "${SSM_PREFIX}/allow-ipv6" \
              --value "$ALLOW_IPV6" \
              --type String \
              --overwrite \
              --region "$REGION"
            echo "[OK] IPv6 allowlist written to SSM"
          else
            echo "[SKIP] ALLOW_IPV6 not set — skipping"
          fi

      # -----------------------------------------------------------------------
      # Phase 1b — Seed CloudFront Origin Secret
      #
      # Ensures /k8s/{env}/cloudfront-origin-secret exists in eu-west-1 SSM
      # before the EdgeStack AwsCustomResource reads it.  The edge stack
      # deploys in us-east-1 and calls SSM cross-region; if the parameter is
      # absent the Lambda receives ParameterNotFound which CloudFormation
      # surfaces as the opaque "UnknownError" on ReadCloudfrontOriginSecret.
      #
      # This step is idempotent:
      #   - If the parameter already exists → no-op (secret preserved).
      #   - If missing → generates openssl rand -hex 32 and creates it.
      #
      # ── Secret Rotation (zero-downtime) ──────────────────────────────
      # To rotate without dropping traffic:
      #   1. Update SSM (--overwrite) with new value, re-run this pipeline.
      #      deploy.py Step 5 reads the new value and patches the ArgoCD
      #      Application's cloudfront.originSecret helm parameter.
      #   2. While CloudFront propagates (~15 min), temporarily set
      #      cloudfront.originSecret to "OLD_HEX|NEW_HEX" so Traefik's
      #      HeadersRegexp accepts both values.
      #   3. After propagation, re-run deploy.py to set NEW_HEX only.
      # -----------------------------------------------------------------------
      - name: "Phase 1b — Seed CloudFront Origin Secret"
        run: |
          SSM_PARAM="/k8s/${{ inputs.cdk-environment }}/cloudfront-origin-secret"
          REGION="${{ env.AWS_REGION }}"

          EXISTING=$(aws ssm get-parameter \
            --name "$SSM_PARAM" \
            --with-decryption \
            --region "$REGION" \
            --query 'Parameter.Value' \
            --output text 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "[OK] CloudFront origin secret already exists — skipping"
            exit 0
          fi

          echo "[INFO] Parameter not found — generating new 32-byte hex secret"
          SECRET=$(openssl rand -hex 32)
          echo "::add-mask::$SECRET"

          aws ssm put-parameter \
            --name "$SSM_PARAM" \
            --value "$SECRET" \
            --type SecureString \
            --region "$REGION"

          echo "[OK] CloudFront origin secret seeded at $SSM_PARAM"
          echo "     Re-run deploy-edge (deploy-kubernetes pipeline) so"
          echo "     CloudFront picks up the new header value."

      # -----------------------------------------------------------------------
      # Phase 2 — Sync Bootstrap & Deploy Scripts to S3
      #
      # Syncs three targets via sync-bootstrap-scripts.ts:
      #   1. kubernetes-app/k8s-bootstrap/      → s3://{bucket}/k8s-bootstrap/
      #   2. kubernetes-app/workloads/charts/nextjs/ → s3://{bucket}/app-deploy/nextjs/
      #   3. kubernetes-app/platform/charts/monitoring/ → s3://{bucket}/app-deploy/monitoring/
      #
      # SSM Automation documents download from these prefixes before
      # executing Python step scripts on EC2 instances.
      # -----------------------------------------------------------------------
      - name: "Phase 2 — Sync Scripts to S3"
        run: just ci-sync-scripts --environment ${{ inputs.environment }} --region ${{ env.AWS_REGION }}

      # -----------------------------------------------------------------------
      # Phase 3 — Verify S3 Artefacts
      #
      # Integration test that validates S3 sync output:
      #   - Scripts bucket SSM parameter resolves to a real S3 bucket
      #   - k8s-bootstrap/ prefix has ≥10 files (core Python steps)
      #   - app-deploy/nextjs/ and app-deploy/monitoring/ are present
      #     (vacuous pass if optional targets not yet synced)
      #
      # Uses: s3-bootstrap-artefacts.integration.test.ts
      # Recipe: just ci-integration-test kubernetes/s3-bootstrap-artefacts
      # -----------------------------------------------------------------------
      - name: "Phase 3 — Verify S3 Artefacts"
        env:
          CDK_ENV: ${{ inputs.cdk-environment }}
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
        run: |
          yarn --cwd infra install --immutable
          just ci-integration-test kubernetes/s3-bootstrap-artefacts $CDK_ENV --verbose

      # -----------------------------------------------------------------------
      # NOTE: SLSA Build Provenance (actions/attest-build-provenance) was
      # removed because GitHub Attestations are not available for private
      # repositories. If this repo becomes public, re-enable attestation
      # by adding 'attestations: write' permission and the attest step.
      # See: https://docs.github.com/en/actions/security-for-github-actions/using-artifact-attestations
      # -----------------------------------------------------------------------

  # ===========================================================================
  # Phase 4: Trigger Bootstrap — Start Step Functions Executions
  #
  # Resolves instance IDs from EC2 tags (live; never stale). Reads the
  # state machine ARN from SSM ({ssmPrefix}/bootstrap/state-machine-arn).
  #
  # Execution order:
  #   1. Start control-plane execution
  #   2. Wait for control-plane to SUCCEED (workers need join credentials)
  #   3. Start worker pool executions (general-pool, monitoring-pool)
  #
  # Each execution is started with a synthetic EventBridge-style payload
  # so the router Lambda can resolve role tags from the ASG.
  # ===========================================================================
  trigger-bootstrap:
    name: "Phase 4 — Trigger Step Functions Bootstrap"
    needs: [sync-and-verify]
    if: inputs.trigger-bootstrap
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    outputs:
      cp-execution-id: ${{ steps.trigger.outputs.cp_execution_id }}
      worker-execution-id: ${{ steps.trigger.outputs.worker_execution_id }}
      mon-worker-execution-id: ${{ steps.trigger.outputs.mon_worker_execution_id }}
      argocd-worker-execution-id: ${{ steps.trigger.outputs.argocd_worker_execution_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      # -----------------------------------------------------------------------
      # Start Step Functions Bootstrap Executions
      #
      # Resolves the state machine ARN from SSM, resolves instance IDs from
      # EC2 tags (never stale), verifies SSM agent health, then calls
      # states:StartExecution for each role.
      #
      # The Lambda router inside the state machine reads the ASG tags to
      # determine the role and resolve the S3 bucket.
      # -----------------------------------------------------------------------
      - name: Start Step Functions Executions on Nodes
        id: trigger
        run: just ci-trigger-bootstrap --environment ${{ inputs.environment }} --region ${{ env.AWS_REGION }}


  # ===========================================================================
  # Phase 5: Verify Bootstrap — Node Readiness & Cluster Health (k8s-runner)
  #
  # Verifies that SM-A produced a healthy cluster by checking node and
  # core system pod state directly via kubectl from the k8s-runner pod.
  #
  # Checks:
  #   1. All nodes are Ready (kubectl wait --for=condition=Ready)
  #   2. kube-system pods are Running (coredns, calico, etc.)
  #   3. Failure diagnostics: node describe + recent events
  #
  # Runs on k8s-runner (in-cluster kubectl — no SSM send-command hop).
  # Kubeconfig fetched from SSM; server URL rewritten from 127.0.0.1:6443
  # to kubernetes.default.svc:443 (same pattern as _post-bootstrap-config.yml).
  #
  # Passes vacuously when trigger-bootstrap was skipped (S3-sync-only runs).
  # ===========================================================================
  verify-bootstrap:
    name: "Phase 5 — Verify Bootstrap (k8s-runner)"
    needs: [trigger-bootstrap]
    if: >-
      always()
      && (needs.trigger-bootstrap.result == 'success'
       || needs.trigger-bootstrap.result == 'skipped'
       || needs.trigger-bootstrap.result == 'failure')
    runs-on: k8s-runner
    timeout-minutes: 15
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      # -----------------------------------------------------------------------
      # Set up in-cluster kubeconfig
      #
      # Fetched from SSM; server URL rewritten from 127.0.0.1:6443
      # (control-plane localhost) to kubernetes.default.svc:443 (in-cluster DNS).
      # Same pattern as _post-bootstrap-config.yml and deploy-api.yml.
      # Step exits 0 with a warning on Day-0 when the kubeconfig SSM param
      # does not yet exist (bootstrap has never completed).
      # -----------------------------------------------------------------------
      - name: Set up in-cluster kubeconfig
        id: kubeconfig
        run: |
          PARAM="/k8s/${{ inputs.cdk-environment }}/kubeconfig"
          VALUE=$(aws ssm get-parameter \
            --name "$PARAM" \
            --with-decryption \
            --region "${{ vars.AWS_REGION || 'eu-west-1' }}" \
            --query 'Parameter.Value' \
            --output text 2>/dev/null || echo "")

          if [ -z "$VALUE" ]; then
            echo "[SKIP] Kubeconfig SSM parameter not found — Day-0 or bootstrap never completed"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$VALUE" \
            | sed 's|https://127.0.0.1:6443|https://kubernetes.default.svc:443|g' \
            > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          echo "available=true" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Node Readiness
      #
      # Waits up to 5 minutes for all nodes to reach Ready condition.
      # SM-A bootstraps the control plane first, then workers re-join;
      # on a fresh bootstrap, workers may take 1–3 min to appear.
      # -----------------------------------------------------------------------
      - name: Wait for all nodes Ready
        if: steps.kubeconfig.outputs.available == 'true'
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "=== Node state at verify time ==="
          kubectl get nodes -o wide

          echo ""
          echo "=== Waiting up to 5 min for all nodes to be Ready ==="
          kubectl wait --for=condition=Ready nodes --all --timeout=300s

          TOTAL=$(kubectl get nodes --no-headers | wc -l)
          READY=$(kubectl get nodes --no-headers | grep -c ' Ready')
          echo ""
          echo "[OK] ${READY}/${TOTAL} nodes Ready"

      # -----------------------------------------------------------------------
      # Core System Pod Health
      #
      # Confirms kube-system pods (coredns, calico-node, kube-proxy, etc.)
      # are Running or Completed. A CrashLoopBackOff here indicates a failed
      # bootstrap step (CNI misconfiguration, etcd issue, etc.).
      # -----------------------------------------------------------------------
      - name: Verify kube-system pods
        if: steps.kubeconfig.outputs.available == 'true'
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "=== kube-system pods ==="
          kubectl get pods -n kube-system -o wide

          NOT_OK=$(kubectl get pods -n kube-system --no-headers \
            | grep -v -E 'Running|Completed' | wc -l)

          if [ "$NOT_OK" -gt 0 ]; then
            echo ""
            echo "ERROR: $NOT_OK kube-system pod(s) not Running/Completed:"
            kubectl get pods -n kube-system --no-headers | grep -v -E 'Running|Completed'
            exit 1
          fi
          echo ""
          echo "[OK] All kube-system pods Running or Completed"

      # -----------------------------------------------------------------------
      # Failure Diagnostics
      #
      # Only runs when a previous step fails — surfaces node conditions and
      # recent events for post-mortem without requiring CloudWatch access.
      # -----------------------------------------------------------------------
      - name: Diagnostics on failure
        if: failure() && steps.kubeconfig.outputs.available == 'true'
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "=== Node describe ==="
          kubectl describe nodes || true

          echo ""
          echo "=== Non-running pods (all namespaces) ==="
          kubectl get pods -A --field-selector=status.phase!=Running \
            --field-selector=status.phase!=Succeeded 2>/dev/null || true

          echo ""
          echo "=== Recent cluster events ==="
          kubectl get events -A --sort-by='.lastTimestamp' 2>/dev/null | tail -40 || true

  # ===========================================================================
  # NOTE: SM-B (Config Orchestrator) is intentionally NOT called here.
  #
  # SM-B fires automatically via EventBridge when SM-A succeeds (self-healing).
  # admin-api and public-api configs are applied by deploy-api.yml on k8s-runner.
  # To trigger SM-B manually (e.g. after rotating secrets), use:
  #   deploy-post-bootstrap.yml  (workflow_dispatch)
  #   just config-run development  (local)
  # ===========================================================================
