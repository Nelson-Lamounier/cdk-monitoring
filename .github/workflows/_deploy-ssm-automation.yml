# @format
# @description Reusable SSM Bootstrap Workflow
#
# ─── Purpose ───────────────────────────────────────────────────────
# Bootstrap-only pipeline. Syncs scripts to S3, triggers SSM Automation
# on existing EC2 nodes, and then delegates secrets + verification to
# _post-bootstrap-config.yml.
#
# Does NOT deploy any CDK stacks — all infrastructure (including the
# SSM Automation stack) is deployed by _deploy-kubernetes.yml.
#
# ─── Two-Pipeline Architecture ─────────────────────────────────────
#
#   Pipeline 1: _deploy-kubernetes.yml
#     - Deploys ALL CDK stacks: networking, compute, IAM, API, edge,
#       AND SSM Automation (documents + IAM role)
#
#   Pipeline 2: _deploy-ssm-automation.yml (this file)
#     - Syncs latest bootstrap scripts (Python steps) to S3
#     - Triggers SSM Automation: control-plane first → waits for
#       completion → then triggers workers (need join credentials)
#     - Observes bootstrap with step-level polling and CloudWatch logs
#     - Delegates to _post-bootstrap-config.yml for secrets + verify
#
# ─── Job Flow ───────────────────────────────────────────────────
#   sync-scripts → trigger-bootstrap → watch-bootstrap → post-bootstrap-config
#                                                         └ deploy-*-secrets → verify
#
#   1. sync-scripts           - aws s3 sync of k8s-bootstrap/ + workloads/ to S3
#   2. trigger-bootstrap      - Resolves instance IDs, triggers SSM Automation
#   3. watch-bootstrap        - Polls SSM step status, streams CloudWatch logs
#   4. post-bootstrap-config  - Deploys secrets + ArgoCD health + smoke tests
#                                (reusable: _post-bootstrap-config.yml)
#
# ─── How Instance Discovery Works ─────────────────────────────
# EC2 user data publishes instance IDs to SSM parameters on boot:
#   - /k8s/<env>/bootstrap/control-plane-instance-id
#   - /k8s/<env>/bootstrap/app-worker-instance-id
#   - /k8s/<env>/bootstrap/mon-worker-instance-id
#
# The trigger job reads these to target SSM Automation. If a parameter
# is missing, that node role is skipped (not yet deployed).
#
# ─── Day-2+ Updates ───────────────────────────────────────────────
# Push changes to boot/steps/ to re-sync scripts and re-run bootstrap.
# To update secrets only (without bootstrap), use deploy-post-bootstrap.yml.

name: Deploy SSM Automation (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (development, staging, production)"
        required: true
        type: string
      cdk-environment:
        description: "CDK environment name (used by secrets and verify steps)"
        required: true
        type: string
      trigger-bootstrap:
        description: "Trigger SSM Automation on nodes"
        required: false
        default: true
        type: boolean
    secrets:
      AWS_OIDC_ROLE:
        description: "AWS OIDC role ARN"
        required: false
      ALLOW_IPV4:
        description: "IPv4 CIDR for Traefik admin-ip-allowlist (Grafana/Prometheus/ArgoCD)"
        required: false
      ALLOW_IPV6:
        description: "IPv6 CIDR for Traefik admin-ip-allowlist (Grafana/Prometheus/ArgoCD)"
        required: false

permissions:
  id-token: write        # Required for OIDC → aws-actions/configure-aws-credentials
  contents: read         # Required for actions/checkout

env:
  NODE_VERSION: "22"
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  # Injected into CDK TaggingAspect as the 'version' tag on all resources
  INFRA_VERSION: ${{ github.sha }}

jobs:
  # ===========================================================================
  # Sync Bootstrap Scripts to S3
  #
  # Ensures latest Python step scripts are in S3 before triggering.
  # SSM Automation downloads these before each step execution.
  # ===========================================================================
  sync-scripts:
    name: Sync Bootstrap Scripts
    if: inputs.trigger-bootstrap
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      # -----------------------------------------------------------------------
      # Write Admin IPs to SSM
      #
      # bootstrap_argocd.py (Step 5b) reads these paths to inject
      # adminAccess.allowedIps into the monitoring ArgoCD Application
      # via Helm parameter overrides, populating the admin-ip-allowlist
      # Traefik Middleware. Without this, the middleware renders with an
      # empty sourceRange and Traefik returns 403 for all
      # Grafana/Prometheus/ArgoCD requests.
      #
      # The Data stack CDK deploy also writes these (Fix A), but this step
      # ensures the SSM params are current on script-only re-bootstraps.
      # -----------------------------------------------------------------------
      - name: Write Admin IPs to SSM
        env:
          ALLOW_IPV4: ${{ secrets.ALLOW_IPV4 }}
          ALLOW_IPV6: ${{ secrets.ALLOW_IPV6 }}
        run: |
          SSM_PREFIX="/k8s/${{ inputs.cdk-environment }}/monitoring"
          REGION="${{ env.AWS_REGION }}"

          if [ -n "$ALLOW_IPV4" ]; then
            aws ssm put-parameter \
              --name "${SSM_PREFIX}/allow-ipv4" \
              --value "$ALLOW_IPV4" \
              --type String \
              --overwrite \
              --region "$REGION"
            echo "[OK] IPv4 allowlist written to SSM"
          else
            echo "[SKIP] ALLOW_IPV4 not set — skipping"
          fi

          if [ -n "$ALLOW_IPV6" ]; then
            aws ssm put-parameter \
              --name "${SSM_PREFIX}/allow-ipv6" \
              --value "$ALLOW_IPV6" \
              --type String \
              --overwrite \
              --region "$REGION"
            echo "[OK] IPv6 allowlist written to SSM"
          else
            echo "[SKIP] ALLOW_IPV6 not set — skipping"
          fi

      - name: Sync Scripts to S3
        run: just ci-sync-scripts --environment ${{ inputs.environment }} --region ${{ env.AWS_REGION }}

      # -----------------------------------------------------------------------
      # NOTE: SLSA Build Provenance (actions/attest-build-provenance) was
      # removed because GitHub Attestations are not available for private
      # repositories. If this repo becomes public, re-enable attestation
      # by adding 'attestations: write' permission and the attest step.
      # See: https://docs.github.com/en/actions/security-for-github-actions/using-artifact-attestations
      # -----------------------------------------------------------------------

  # ===========================================================================
  # Trigger SSM Bootstrap — Start SSM Automation on existing nodes
  #
  # Resolves instance IDs from SSM parameters (published by user data
  # during boot). Triggers control-plane first, waits for completion,
  # then triggers workers.
  # ===========================================================================
  trigger-bootstrap:
    name: Trigger SSM Bootstrap
    needs: [sync-scripts]
    if: inputs.trigger-bootstrap
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    outputs:
      cp-execution-id: ${{ steps.trigger.outputs.cp_execution_id }}
      worker-execution-id: ${{ steps.trigger.outputs.worker_execution_id }}
      mon-worker-execution-id: ${{ steps.trigger.outputs.mon_worker_execution_id }}
      argocd-worker-execution-id: ${{ steps.trigger.outputs.argocd_worker_execution_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Trigger SSM Automation on Nodes
        id: trigger
        run: just ci-trigger-bootstrap --environment ${{ inputs.environment }} --region ${{ env.AWS_REGION }}

  # ===========================================================================
  # SSM Bootstrap Observer — Monitor SSM Automation Execution (parallel)
  #
  # Polls step-level progress and streams logs into GitHub Actions.
  # ===========================================================================
  watch-bootstrap:
    name: SSM Bootstrap Observer
    needs: [trigger-bootstrap]
    if: inputs.trigger-bootstrap && needs.trigger-bootstrap.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js & Install dependencies
        uses: ./.github/actions/setup-node-yarn

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          audience: sts.amazonaws.com

      - name: Stream SSM Bootstrap Logs
        run: >-
          just ci-observe-bootstrap
          --environment ${{ inputs.environment }}
          --execution-id ${{ needs.trigger-bootstrap.outputs.cp-execution-id }}
          --cdk-environment ${{ inputs.cdk-environment }}
          --region ${{ vars.AWS_REGION || 'eu-west-1' }}

  # ===========================================================================
  # Verify SSM Automation — Integration Tests Gate
  #
  # Runs integration tests that call real AWS APIs to validate that SSM
  # Automation executions completed successfully. Verifies:
  #   Phase 1: Step Functions state machine exists, SSM doc params published
  #   Phase 2: SFN orchestrator execution succeeded, per-role SSM Automation
  #            documents completed with Success status
  #
  # Runs in parallel with post-bootstrap-config (secrets deployment is
  # independent from automation verification).
  # ===========================================================================
  verify-ssm-automation:
    name: Verify SSM Automation
    needs: [watch-bootstrap]
    if: >-
      always()
      && (needs.watch-bootstrap.result == 'success' || needs.watch-bootstrap.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          audience: sts.amazonaws.com

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: yarn install --immutable
        working-directory: infra

      - name: Run SSM Automation Integration Tests
        env:
          CDK_ENV: ${{ inputs.cdk-environment }}
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
        run: just ci-integration-test kubernetes/ssm-automation-runtime $CDK_ENV --verbose

  # ===========================================================================
  # Post-Bootstrap Config — Deploy secrets + verify ArgoCD
  #
  # Calls the reusable _post-bootstrap-config.yml workflow which deploys
  # Next.js and monitoring secrets, then verifies ArgoCD health.
  # Can also be run independently via deploy-post-bootstrap.yml.
  # ===========================================================================
  post-bootstrap-config:
    name: Post-Bootstrap Config
    needs: [watch-bootstrap]
    if: >-
      always()
      && needs.watch-bootstrap.result == 'success'
      && inputs.trigger-bootstrap == true
    uses: ./.github/workflows/_post-bootstrap-config.yml
    with:
      environment: ${{ inputs.environment }}
      cdk-environment: ${{ inputs.cdk-environment }}
    secrets: inherit

