# @format
# @description Reusable SSM Automation Deployment + Bootstrap + App Secrets Workflow
#
# ─── Purpose ───────────────────────────────────────────────────────
# Deploys the SSM Automation CDK stack and triggers Kubernetes
# bootstrap on existing EC2 nodes. This is the second pipeline in the
# two-pipeline architecture, fully decoupled from the CDK infra pipeline.
#
# ─── Two-Pipeline Architecture ─────────────────────────────────────
# Kubernetes bootstrapping is split across two independent pipelines:
#
#   Pipeline 1: _deploy-kubernetes.yml
#     - Deploys CDK stacks: networking, compute, IAM, API, edge
#     - EC2 user data exports env vars, publishes instance IDs to SSM,
#       and signals CloudFormation. Does NOT trigger SSM Automation. - Test
#
#   Pipeline 2: _deploy-ssm-automation.yml (this file)
#     - Deploys the SSM Automation CDK stack (documents + IAM role)
#     - Syncs latest bootstrap scripts (Python steps) to S3
#     - Triggers SSM Automation: control-plane first → waits for
#       completion → then triggers workers (need join credentials)
#     - Observes bootstrap with step-level polling and CloudWatch logs
#
# ─── Job Flow ──────────────────────────────────────────────────────
#   deploy → sync-scripts → trigger-bootstrap → watch-bootstrap → deploy-nextjs-secrets → verify
#
#   1. deploy              - CDK deploy of the ssmAutomation stack
#   2. sync-scripts        - aws s3 sync of k8s-bootstrap/ + workloads/charts/nextjs/ to S3
#   3. trigger-bootstrap   - Resolves instance IDs from SSM parameters,
#                            triggers SSM Automation per node role
#   4. watch-bootstrap     - Polls SSM step status, streams CloudWatch logs
#   5. deploy-nextjs-secrets - Runs deploy.py on control plane via SSM send-command
#                              to create nextjs-secrets K8s Secret from SSM parameters
#   6. verify              - ArgoCD health + K8s smoke tests
#
#   Jobs 2-4 are gated behind the `trigger-bootstrap` input.
#   Set to false when deploying the stack without re-bootstrapping.
#
# ─── How Instance Discovery Works ─────────────────────────────────
# EC2 user data publishes instance IDs to SSM parameters on boot:
#   - /k8s/<env>/bootstrap/control-plane-instance-id
#   - /k8s/<env>/bootstrap/app-worker-instance-id
#   - /k8s/<env>/bootstrap/mon-worker-instance-id
#
# The trigger job reads these to target SSM Automation. If a parameter
# is missing, that node role is skipped (not yet deployed).
#
# ─── Day-1 Deployment ──────────────────────────────────────────────
# Run after the CDK infra pipeline completes:
#   1. deploy-kubernetes.yml  → provisions infrastructure
#   2. deploy-ssm-automation.yml → bootstrap (this pipeline)
#
# ─── Day-2+ Updates ───────────────────────────────────────────────
# Push changes to boot/steps/ or ssm-automation-stack.ts to trigger
# automatically. The pipeline re-deploys SSM docs, syncs the latest
# scripts, and re-runs bootstrap on all running nodes.
#
# Stack: ssmAutomation (SSM Automation documents + IAM role)

name: Deploy SSM Automation (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (development, staging, production)"
        required: true
        type: string
      cdk-environment:
        description: "CDK environment name"
        required: true
        type: string
      require-approval:
        description: "CDK deployment approval mode"
        required: false
        default: "never"
        type: string
      trigger-bootstrap:
        description: "Trigger SSM Automation on nodes after deploy"
        required: false
        default: true
        type: boolean
    outputs:
      control-plane-doc-name:
        description: "SSM Automation document name for control plane bootstrap"
        value: ${{ jobs.deploy.outputs.control-plane-doc-name }}
      worker-doc-name:
        description: "SSM Automation document name for worker bootstrap"
        value: ${{ jobs.deploy.outputs.worker-doc-name }}
    secrets:
      AWS_OIDC_ROLE:
        description: "AWS OIDC role ARN"
        required: false
      VERIFICATION_SECRET:
        description: "Email verification HMAC secret (needed for CDK synth)"
        required: false
      ALLOW_IPV4:
        description: "IPv4 CIDR for Traefik admin-ip-allowlist (Grafana/Prometheus/ArgoCD)"
        required: false
      ALLOW_IPV6:
        description: "IPv6 CIDR for Traefik admin-ip-allowlist (Grafana/Prometheus/ArgoCD)"
        required: false

env:
  NODE_VERSION: "22"
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  # ===========================================================================
  # Deploy SSM Automation Stack
  # ===========================================================================
  deploy:
    name: Deploy SSM Automation
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    outputs:
      control-plane-doc-name: ${{ steps.deploy-stack.outputs.control-plane-doc-name }}
      worker-doc-name: ${{ steps.deploy-stack.outputs.worker-doc-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      # Synthesize all stacks (synthesize-ci.ts writes stack names to $GITHUB_OUTPUT)
      # NOTE: CDK synth is all-or-nothing — it synthesizes every stack in the app,
      # including Edge which requires DNS config. We bridge these env vars from
      # GitHub environment variables even though we only deploy the SSM stack.
      - name: CDK Synth
        id: synth
        env:
          HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
          CROSS_ACCOUNT_ROLE_ARN: ${{ vars.DNS_VALIDATION_ROLE }}
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          NOTIFICATION_EMAIL: ${{ vars.NOTIFICATION_EMAIL || '' }}
          SES_FROM_EMAIL: ${{ vars.SES_FROM_EMAIL || '' }}
          VERIFICATION_SECRET: ${{ secrets.VERIFICATION_SECRET || '' }}
          VERIFICATION_BASE_URL: ${{ vars.VERIFICATION_BASE_URL || '' }}
          ALLOW_IPV4: ${{ secrets.ALLOW_IPV4 }}
          ALLOW_IPV6: ${{ secrets.ALLOW_IPV6 || '' }}
        run: just ci-synth kubernetes ${{ inputs.cdk-environment }}

      # Deploy only the SSM Automation stack
      - name: CDK Deploy — SSM Automation
        id: deploy-stack
        working-directory: infra
        run: |
          echo "Deploying stack: ${{ steps.synth.outputs.ssmAutomation }}"
          npx cdk deploy "${{ steps.synth.outputs.ssmAutomation }}" \
            --exclusively \
            --require-approval ${{ inputs.require-approval }} \
            --outputs-file /tmp/ssm-outputs.json \
            --context project=kubernetes \
            --context environment=${{ inputs.cdk-environment }} \
            2>&1

          # Extract document names from stack outputs
          echo "control-plane-doc-name=$(jq -r '.[] | .ControlPlaneDocName // empty' /tmp/ssm-outputs.json 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "worker-doc-name=$(jq -r '.[] | .WorkerDocName // empty' /tmp/ssm-outputs.json 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "### SSM Automation Stack Deployed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Document | Name |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Control Plane | ${{ steps.deploy-stack.outputs.control-plane-doc-name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | ${{ steps.deploy-stack.outputs.worker-doc-name }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Sync Bootstrap Scripts to S3
  #
  # Ensures latest Python step scripts are in S3 before triggering.
  # SSM Automation downloads these before each step execution.
  # ===========================================================================
  sync-scripts:
    name: Sync Bootstrap Scripts
    needs: [deploy]
    if: inputs.trigger-bootstrap
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      # -----------------------------------------------------------------------
      # Write Admin IPs to SSM
      #
      # bootstrap_argocd.py (Step 5b) reads these paths to inject
      # adminAccess.allowedIps into the monitoring ArgoCD Application
      # via Helm parameter overrides, populating the admin-ip-allowlist
      # Traefik Middleware. Without this, the middleware renders with an
      # empty sourceRange and Traefik returns 403 for all
      # Grafana/Prometheus/ArgoCD requests.
      #
      # The Data stack CDK deploy also writes these (Fix A), but this step
      # ensures the SSM params are current on script-only re-bootstraps.
      # -----------------------------------------------------------------------
      - name: Write Admin IPs to SSM
        env:
          ALLOW_IPV4: ${{ secrets.ALLOW_IPV4 }}
          ALLOW_IPV6: ${{ secrets.ALLOW_IPV6 }}
        run: |
          SSM_PREFIX="/k8s/${{ inputs.cdk-environment }}/monitoring"
          REGION="${{ env.AWS_REGION }}"

          if [ -n "$ALLOW_IPV4" ]; then
            aws ssm put-parameter \
              --name "${SSM_PREFIX}/allow-ipv4" \
              --value "$ALLOW_IPV4" \
              --type String \
              --overwrite \
              --region "$REGION"
            echo "[OK] Wrote ${SSM_PREFIX}/allow-ipv4"
          else
            echo "[SKIP] ALLOW_IPV4 not set — skipping"
          fi

          if [ -n "$ALLOW_IPV6" ]; then
            aws ssm put-parameter \
              --name "${SSM_PREFIX}/allow-ipv6" \
              --value "$ALLOW_IPV6" \
              --type String \
              --overwrite \
              --region "$REGION"
            echo "[OK] Wrote ${SSM_PREFIX}/allow-ipv6"
          else
            echo "[SKIP] ALLOW_IPV6 not set — skipping"
          fi

      - name: Sync Scripts to S3
        run: just ci-sync-scripts --environment ${{ inputs.environment }} --region ${{ env.AWS_REGION }}

  # ===========================================================================
  # Trigger SSM Bootstrap — Start SSM Automation on existing nodes
  #
  # Resolves instance IDs from SSM parameters (published by user data
  # during boot). Triggers control-plane first, waits for completion,
  # then triggers workers.
  # ===========================================================================
  trigger-bootstrap:
    name: Trigger SSM Bootstrap
    needs: [deploy, sync-scripts]
    if: inputs.trigger-bootstrap
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    outputs:
      cp-execution-id: ${{ steps.trigger.outputs.cp_execution_id }}
      worker-execution-id: ${{ steps.trigger.outputs.worker_execution_id }}
      mon-worker-execution-id: ${{ steps.trigger.outputs.mon_worker_execution_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Trigger SSM Automation on Nodes
        id: trigger
        run: just ci-trigger-bootstrap --environment ${{ inputs.environment }} --region ${{ env.AWS_REGION }}

  # ===========================================================================
  # SSM Bootstrap Observer — Monitor SSM Automation Execution (parallel)
  #
  # Polls step-level progress and streams logs into GitHub Actions.
  # ===========================================================================
  watch-bootstrap:
    name: SSM Bootstrap Observer
    needs: [trigger-bootstrap]
    if: inputs.trigger-bootstrap && needs.trigger-bootstrap.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js & Install dependencies
        uses: ./.github/actions/setup-node-yarn

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          audience: sts.amazonaws.com

      - name: Stream SSM Bootstrap Logs
        run: >-
          just ci-observe-bootstrap
          --environment ${{ inputs.environment }}
          --execution-id ${{ needs.trigger-bootstrap.outputs.cp-execution-id }}
          --cdk-environment ${{ inputs.cdk-environment || inputs.environment }}
          --region ${{ vars.AWS_REGION || 'eu-west-1' }}

  # ===========================================================================
  # Deploy Next.js Secrets — Create K8s Secret from SSM Parameters
  #
  # Runs deploy.py on the control plane via SSM Automation document.
  # The document syncs deploy scripts from S3 and executes deploy.py
  # to resolve SSM parameters and create/update the nextjs-secrets
  # K8s Secret.
  #
  # Visible in: AWS Console → Systems Manager → Automation → Executions
  #
  # Depends on: watch-bootstrap (cluster must be ready before creating secrets)
  # ===========================================================================
  deploy-nextjs-secrets:
    name: Deploy Next.js Secrets
    needs: [deploy, watch-bootstrap]
    if: >-
      always()
      && needs.watch-bootstrap.result == 'success'
      && inputs.trigger-bootstrap == true
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js & Install dependencies
        uses: ./.github/actions/setup-node-yarn

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          audience: sts.amazonaws.com

      - name: Deploy Next.js Secrets
        run: |
          just ci-deploy-nextjs-secrets \
            --environment ${{ inputs.environment }} \
            --region ${{ vars.AWS_REGION || 'eu-west-1' }}

  # ===========================================================================
  # Deploy Monitoring Secrets — Create K8s Secrets from SSM Parameters
  #
  # Runs deploy.py on the control plane via SSM Automation document.
  # The document syncs deploy scripts from S3 and executes deploy.py
  # to resolve SSM parameters (grafana-admin-password, github-token),
  # create/update K8s Secrets, deploy Helm chart, and reset Grafana password.
  #
  # Visible in: AWS Console → Systems Manager → Automation → Executions
  #
  # Depends on: watch-bootstrap (cluster must be ready before creating secrets)
  # ===========================================================================
  deploy-monitoring-secrets:
    name: Deploy Monitoring Secrets
    needs: [deploy, watch-bootstrap]
    if: >-
      always()
      && needs.watch-bootstrap.result == 'success'
      && inputs.trigger-bootstrap == true
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js & Install dependencies
        uses: ./.github/actions/setup-node-yarn

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          audience: sts.amazonaws.com

      - name: Deploy Monitoring Secrets
        run: >-
          just ci-deploy-monitoring-secrets
          --environment ${{ inputs.environment }}
          --region ${{ vars.AWS_REGION || 'eu-west-1' }}

  # ===========================================================================
  # Verify & Smoke Tests
  #
  # Runs after bootstrap and secret deployment complete. Verifies ArgoCD
  # server health, runs K8s infrastructure smoke tests, and captures
  # diagnostics on failure.
  # Skipped on Day-0 when no ArgoCD token exists yet.
  # ===========================================================================
  verify:
    name: Verify & Smoke Tests
    needs:
      [
        deploy,
        watch-bootstrap,
        deploy-nextjs-secrets,
        deploy-monitoring-secrets,
      ]
    if: >-
      always()
      && needs.watch-bootstrap.result == 'success'
      && (needs.deploy-nextjs-secrets.result == 'success' || needs.deploy-nextjs-secrets.result == 'skipped')
      && (needs.deploy-monitoring-secrets.result == 'success' || needs.deploy-monitoring-secrets.result == 'skipped')
      && inputs.trigger-bootstrap == true
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Wait for ArgoCD Token
        id: argocd-token
        continue-on-error: true # Day-0: token may not exist on first deployment
        run: |
          SECRET_NAME="k8s/${{ inputs.cdk-environment }}/argocd-ci-token"
          MAX_ATTEMPTS=20
          INTERVAL=30

          echo "Polling Secrets Manager for ArgoCD CI token..."
          echo "  Secret: ${SECRET_NAME}"
          echo "  Max wait: $(( MAX_ATTEMPTS * INTERVAL ))s"
          echo ""

          for i in $(seq 1 $MAX_ATTEMPTS); do
            TOKEN=$(aws secretsmanager get-secret-value \
              --secret-id "$SECRET_NAME" \
              --query SecretString --output text 2>/dev/null || echo "")

            if [ -n "$TOKEN" ]; then
              echo "::add-mask::$TOKEN"
              echo "token=$TOKEN" >> $GITHUB_OUTPUT
              echo "[OK] ArgoCD token retrieved (attempt $i/${MAX_ATTEMPTS})"
              exit 0
            fi

            echo "Attempt $i/${MAX_ATTEMPTS} — token not ready, waiting ${INTERVAL}s..."
            sleep $INTERVAL
          done

          echo "::warning::ArgoCD token not found after ${MAX_ATTEMPTS} attempts — Day-0 bootstrap; skipping ArgoCD verification"

      # -----------------------------------------------------------------------
      # ArgoCD Server Health (via SSM send-command)
      #
      # Verifies the ArgoCD SERVER is reachable after bootstrap.
      # Uses the same verify-argocd-sync.ts script in --mode health,
      # which runs curl on the control plane node via SSM send-command.
      #
      # On Day-0 (no token), this step is skipped gracefully.
      # -----------------------------------------------------------------------
      - name: "ArgoCD Server Health"
        if: steps.argocd-token.outputs.token != '' && steps.argocd-token.outcome == 'success'
        env:
          ARGOCD_TOKEN: ${{ steps.argocd-token.outputs.token }}
        run: |
          just ci-argocd-health \
            --environment ${{ inputs.cdk-environment }} \
            --region ${{ env.AWS_REGION }} \
            --max-polls 6 \
            --poll-interval 20

      - name: Run K8s Smoke Tests
        id: smoke
        run: |
          SMOKE_CMD="just ci-smoke-kubernetes-infra ${{ inputs.cdk-environment }} --region ${{ env.AWS_REGION }}"
          eval $SMOKE_CMD

      # -----------------------------------------------------------------------
      # Failure Diagnostics — K8s state + boot logs on failure
      # -----------------------------------------------------------------------
      - name: "Capture Failure Diagnostics"
        if: failure()
        continue-on-error: true
        run: |
          echo "## Failure Diagnostics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${{ inputs.environment }} | **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SSM_PREFIX="/k8s/${{ inputs.cdk-environment }}"
          REGION="${{ env.AWS_REGION }}"

          # Resolve control-plane instance ID
          INSTANCE_ID=$(aws ssm get-parameter \
            --name "${SSM_PREFIX}/bootstrap/control-plane-instance-id" \
            --query 'Parameter.Value' --output text \
            --region "$REGION" 2>/dev/null || echo "")

          if [ -n "$INSTANCE_ID" ]; then
            echo "### K8s Pod Status (non-Running)" >> $GITHUB_STEP_SUMMARY
            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["sudo kubectl get pods -A --field-selector=status.phase!=Running -o wide 2>/dev/null || echo No kubectl access"]' \
              --query 'Command.CommandId' --output text \
              --region "$REGION" 2>/dev/null || echo "")
            if [ -n "$CMD_ID" ]; then
              sleep 10
              POD_OUTPUT=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                --query 'StandardOutputContent' --output text \
                --region "$REGION" 2>/dev/null || echo "Could not retrieve")
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$POD_OUTPUT" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "_Could not resolve instance ID from SSM — skipping K8s diagnostics_" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "Fetch Boot Logs from CloudWatch"
        if: failure()
        continue-on-error: true
        run: just ci-fetch-boot-logs ${{ inputs.cdk-environment }} --region ${{ env.AWS_REGION }}
