# @format
# @description Deploy Post-Bootstrap Config (Standalone)
#
# ─── Purpose ───────────────────────────────────────────────────────
# Standalone pipeline to re-inject Kubernetes application secrets and
# verify ArgoCD health WITHOUT re-triggering SM-A (Bootstrap Orchestrator).
#
# This calls SM-B (Config Orchestrator) via _post-bootstrap-config.yml
# which runs the five deploy.py scripts sequentially on the control plane:
#   1. nextjs/deploy.py      — K8s Secret + IngressRoute originSecret patch
#   2. monitoring/deploy.py  — K8s Secrets + Helm chart + Grafana reset
#   3. start-admin/deploy.py — Cognito / DynamoDB / Bedrock Secret
#   4. admin-api/deploy.py   — ConfigMap + Secret + IngressRoute
#   5. public-api/deploy.py  — ConfigMap + Secret + IngressRoute
#
# ─── Use This When ─────────────────────────────────────────────────
#   - Rotating secrets (new SSM parameter values → re-inject via SM-B)
#   - Helm chart config changes (values.yaml updates in workloads/charts/)
#   - Verifying ArgoCD health after manual cluster changes
#   - Testing SM-B independently after infrastructure changes
#
# ─── Local Equivalent ──────────────────────────────────────────────
#   just config-run development
#   just config-status          # check execution status
#
# ─── No Bootstrap ──────────────────────────────────────────────────
# SM-A bootstrap is NOT triggered. Use _deploy-ssm-automation.yml
# (via deploy-ssm-automation.yml) when cluster re-bootstrap is needed.

name: Deploy Post-Bootstrap Config

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - development
        default: development

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-post-bootstrap-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  post-bootstrap:
    name: "SM-B Config Injection & Verify"
    uses: ./.github/workflows/_post-bootstrap-config.yml
    with:
      environment: ${{ inputs.environment }}
      cdk-environment: ${{ inputs.environment }}
    secrets: inherit
