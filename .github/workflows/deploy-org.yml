# Deploy Organization Resources (Root Account)
# MANUAL TRIGGER ONLY with confirmation
# Uses root account OIDC credentials via the reusable _deploy-stack.yml workflow

name: Deploy Organization (Root Account)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DEPLOY-ORG" to confirm root account deployment'
        required: true
        type: string
      stack:
        description: "Stack to deploy"
        required: true
        default: "dns-role"
        type: choice
        options:
          - dns-role
          - all

permissions:
  id-token: write
  contents: read

jobs:
  # ===========================================================================
  # Validation
  # ===========================================================================
  validate:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}

    steps:
      - name: Validate Confirmation Input
        id: check
        run: |
          if [ "${{ inputs.confirm }}" != "DEPLOY-ORG" ]; then
            echo "❌ Deployment not confirmed."
            echo "   You must type 'DEPLOY-ORG' to confirm."
            exit 1
          fi
          echo "proceed=true" >> $GITHUB_OUTPUT
          echo "✓ Root account deployment confirmed"

  # ===========================================================================
  # Deploy DNS Role Stack (via reusable workflow)
  # ===========================================================================
  deploy-dns-role:
    name: Deploy DNS Role
    needs: [validate]
    if: inputs.stack == 'dns-role' || inputs.stack == 'all'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: Org-DnsRoleStack-prod
      project: org
      environment: development
      aws-account-id: ${{ vars.ROOT_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
      root-account-id: ${{ vars.ROOT_ACCOUNT_ID }}
      additional-args: >-
        --context hostedZoneIds=${{ vars.HOSTED_ZONE_ID }}
        --context externalId=acm-dns-validation
      outputs-directory: org-outputs
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Summary
  # ===========================================================================
  summary:
    name: Deployment Summary
    needs: [validate, deploy-dns-role]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate Summary
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Organization (Root Account) Deployment

          **Target**: AWS Root/Management Account
          **Timestamp**: ${TIMESTAMP}
          **Stack Requested**: ${{ inputs.stack }}

          ### Deployment Status

          | Stage | Status |
          |-------|--------|
          | Validation | ${{ needs.validate.result }} |
          | DNS Role | ${{ needs.deploy-dns-role.result }} |

          EOF

          if [ "${{ needs.deploy-dns-role.result }}" == "success" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF

          ### Next Steps

          The cross-account DNS validation role is now deployed.
          Target account (portfolio) can now assume this role for ACM certificate validation.

          EOF
          fi

      - name: Check Final Status
        run: |
          if [ "${{ needs.deploy-dns-role.result }}" != "success" ]; then
            echo "❌ Deployment failed or was skipped"
            exit 1
          fi

          echo "✓ Org deployment completed successfully"
