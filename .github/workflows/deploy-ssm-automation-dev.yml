# @format
# @description Deploy SSM Automation to Development
#
# Dedicated pipeline for the SSM Automation stack + bootstrap trigger.
# Fully decoupled from the main K8s CDK pipeline.
#
# Triggers:
#   - Push to main/develop when step scripts or SSM stack change
#   - Manual dispatch (workflow_dispatch)
#
# This pipeline:
#   1. Deploys SSM Automation documents (CDK stack)
#   2. Syncs latest bootstrap scripts to S3
#   3. Triggers SSM Automation on existing nodes
#   4. Observes bootstrap progress with log streaming

name: Deploy SSM Automation to Development

on:
  push:
    branches:
      - develop
      - feature/k3s-kubernetes-migration
    paths:
      # Python step scripts
      - "kubernetes-app/k8s-bootstrap/boot/steps/**"
      # Boot scripts and system configs
      - "kubernetes-app/k8s-bootstrap/boot/**"
      - "kubernetes-app/k8s-bootstrap/system/**"
      # Next.js deploy scripts (secret creation + Helm deploy)
      - "kubernetes-app/app-deploy/nextjs/deploy.py"
      - "kubernetes-app/app-deploy/nextjs/requirements.txt"
      # CDK stack definition
      - "infra/lib/stacks/kubernetes/ssm-automation-stack.ts"
      # Pipeline definitions
      - ".github/workflows/deploy-ssm-automation-dev.yml"
      - ".github/workflows/_deploy-ssm-automation.yml"
  workflow_dispatch:
    inputs:
      trigger_bootstrap:
        description: "Trigger SSM bootstrap on nodes after deploy"
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-ssm-automation-development
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Development
    uses: ./.github/workflows/_deploy-ssm-automation.yml
    with:
      environment: development
      cdk-environment: development
      require-approval: never
      trigger-bootstrap: ${{ github.event.inputs.trigger_bootstrap == '' && true || github.event.inputs.trigger_bootstrap == 'true' }}
    secrets: inherit
