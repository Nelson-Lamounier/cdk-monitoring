# @format
# @description Deploy SSM Bootstrap to Development
#
# Dedicated pipeline for K8s bootstrap trigger (scripts sync + SSM Automation).
# The SSM Automation CDK stack is deployed by _deploy-kubernetes.yml.
#
# Triggers:
#   - Push to main/develop when step scripts change
#   - Manual dispatch (workflow_dispatch)
#
# This pipeline:
#   1. Syncs latest bootstrap scripts to S3
#   2. Triggers SSM Automation on existing nodes
#   3. Observes bootstrap progress with log streaming
#   4. Deploys application secrets

name: Deploy SSM Bootstrap to Development

on:
  # push:
  #   branches: [develop]
  workflow_dispatch:
    inputs:
      trigger_bootstrap:
        description: "Trigger SSM bootstrap on nodes"
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-ssm-bootstrap-development
  cancel-in-progress: false

jobs:
  deploy:
    name: Bootstrap Development
    uses: ./.github/workflows/_deploy-ssm-automation.yml
    with:
      environment: development
      cdk-environment: development
      trigger-bootstrap: ${{ github.event.inputs.trigger_bootstrap == '' && true || github.event.inputs.trigger_bootstrap == 'true' }}
    secrets: inherit
