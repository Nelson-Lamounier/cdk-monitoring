# @format
# @description Reusable Kubernetes Infrastructure Deployment Workflow
#
# ─── Purpose ───────────────────────────────────────────────────────
# Deploys ALL K8s (kubeadm) infrastructure stacks via CDK, including
# the SSM Automation stack. This pipeline provisions AWS resources
# but does NOT bootstrap Kubernetes or trigger SSM Automation.
#
# ─── Two-Pipeline Architecture ─────────────────────────────────────
# Kubernetes deployment is split across two independent pipelines:
#
#   Pipeline 1: _deploy-kubernetes.yml (this file)
#     - Deploys ALL CDK stacks: networking, compute, IAM, API, edge,
#       AND SSM Automation (documents + IAM role)
#     - EC2 user data exports env vars, publishes instance IDs to SSM,
#       and sends cfn-signal to confirm infrastructure readiness
#     - Does NOT download scripts from S3 or trigger SSM Automation
#
#   Pipeline 2: _deploy-ssm-automation.yml
#     - Bootstrap-only: syncs scripts to S3, triggers SSM Automation,
#       observes progress, deploys secrets, and verifies ArgoCD
#     - Does NOT deploy any CDK stacks (that's handled here)
#
# ─── Day-1 Deployment ──────────────────────────────────────────────
# For a fresh cluster, run both pipelines in sequence:
#   1. deploy-kubernetes.yml  → provisions all infrastructure + SSM docs
#   2. deploy-ssm-automation.yml → syncs scripts + triggers bootstrap
#
# ─── Day-2+ Updates ───────────────────────────────────────────────
# - Infrastructure changes: push to trigger deploy-kubernetes.yml
# - Bootstrap script changes: push to trigger deploy-ssm-automation.yml
#   (syncs scripts, re-triggers bootstrap — no CDK deploy needed)
#
# ─── Stack Deployment Order ────────────────────────────────────────
#   1.  Data             (DynamoDB + S3 + SSM Parameters)
#   1b. ✅ Verify Data    (Integration test — DynamoDB, S3, SSM, CFn outputs)
#   2.  Base             (VPC networking + SG + KMS + EBS + EIP + S3 Scripts)
#   2b. ✅ Verify Base    (Integration test — VPC, SGs, KMS, EBS, EIP, Route53)
#   2c. Golden AMI       (Bake containerd + kubeadm into AMI)
#   2d. SSM Automation   (SSM Automation documents + IAM role) [parallel with 2c]
#   3.  Compute          (Control Plane EC2 + ASG)
#   3b. AppWorker        (Application worker node)
#   3c. MonitoringWorker (Monitoring worker node)
#   4.  AppIam           (Application-tier IAM grants)
#   5.  Edge             (CloudFront + ACM + WAF in us-east-1)
#
# ─── Post-Deploy (manifests managed by ArgoCD GitOps) ──────────────
#   6.  ArgoCD Health Gate          (wait for GitOps sync)
#   7.  Verify & Smoke Tests
#   8.  Deployment Failure Alert    (halt + preserve + alert)
#   9.  Summary
#
# ─── Concurrency ───────────────────────────────────────────────────
#   This is a workflow_call (reusable) workflow — concurrency MUST be set
#   on the caller (e.g., deploy-kubernetes.yml).
#   Each caller defines: concurrency: { group: deploy-k8s-<env>, cancel-in-progress: false }

name: Deploy K8s (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (development, staging, production)"
        required: true
        type: string
      cdk-environment:
        description: "CDK environment name"
        required: true
        type: string
      require-approval:
        description: "CDK deployment approval mode"
        required: false
        default: "never"
        type: string
      enable-security-scan:
        description: "Run IaC security scan"
        required: false
        default: false
        type: boolean
      security-scan-blocking:
        description: "Fail pipeline on security scan findings"
        required: false
        default: false
        type: boolean
      skip-verification:
        description: "Skip post-deployment verification"
        required: false
        default: false
        type: boolean
      domain-name:
        description: "Domain name for CloudFront Edge stack (optional — falls back to vars.DOMAIN_NAME)"
        required: false
        type: string
        default: ""
      hosted-zone-id:
        description: "Route53 Hosted Zone ID (optional — falls back to vars.HOSTED_ZONE_ID)"
        required: false
        type: string
        default: ""
      cross-account-role-arn:
        description: "Cross-account IAM role for Route53 (optional — falls back to vars.DNS_VALIDATION_ROLE)"
        required: false
        type: string
        default: ""

    outputs:
      control-plane-doc-name:
        description: "SSM Automation document name for control plane bootstrap"
        value: ${{ jobs.read-ssm-outputs.outputs.control-plane-doc-name }}
      worker-doc-name:
        description: "SSM Automation document name for worker bootstrap"
        value: ${{ jobs.read-ssm-outputs.outputs.worker-doc-name }}

    secrets:
      AWS_OIDC_ROLE:
        description: "AWS OIDC role ARN"
        required: false
      VERIFICATION_SECRET:
        required: false
      ALLOW_IPV4:
        description: "IPv4 CIDR to allowlist in WAF (e.g., 203.0.113.42/32)"
        required: false
      ALLOW_IPV6:
        description: "IPv6 CIDR to allowlist in WAF (e.g., 2a02:8084::/128)"
        required: false

env:
  NODE_VERSION: "22"
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
  # Force Node 24 for actions that haven't released Node 24-native versions yet
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===========================================================================
  # Setup, Build & Synthesize
  # ===========================================================================
  setup:
    name: Setup & Synthesize
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    outputs:
      aws-account-id: ${{ steps.account-id.outputs.account_id }}
      commit-sha: ${{ github.sha }}
      commit-short-sha: ${{ steps.commit-info.outputs.short_sha }}
      node-version: ${{ steps.setup-tools.outputs.node-version }}
      # Resolved edge configuration
      domain-name: ${{ steps.resolve-edge.outputs.domain-name }}
      hosted-zone-id: ${{ steps.resolve-edge.outputs.hosted-zone-id }}
      cross-account-role-arn: ${{ steps.resolve-edge.outputs.cross-account-role-arn }}
      # Stack names from synthesize-ci.ts (10-stack architecture)
      data-stack: ${{ steps.synth.outputs.data }}
      base-stack: ${{ steps.synth.outputs.base }}
      goldenami-stack: ${{ steps.synth.outputs.goldenAmi }}
      controlplane-stack: ${{ steps.synth.outputs.controlPlane }}
      ssmautomation-stack: ${{ steps.synth.outputs.ssmAutomation }}
      worker-stack: ${{ steps.synth.outputs.appWorker }}
      monitoring-worker-stack: ${{ steps.synth.outputs.monitoringWorker }}
      appiam-stack: ${{ steps.synth.outputs.appIam }}
      edge-stack: ${{ steps.synth.outputs.edge }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Record Commit Information
        id: commit-info
        run: echo "short_sha=$(printf '%.8s' "$GITHUB_SHA")" >> $GITHUB_OUTPUT

      - name: Setup Environment and Dependencies
        id: setup-tools
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate AWS Account ID
        id: account-id
        run: |
          ACCOUNT_ID="${{ vars.AWS_ACCOUNT_ID }}"
          if [ -z "$ACCOUNT_ID" ]; then
            echo "ERROR: AWS_ACCOUNT_ID variable not configured"
            exit 1
          fi
          if ! expr "$ACCOUNT_ID" : '^[0-9]\{12\}$' > /dev/null; then
            echo "ERROR: Invalid AWS account ID format"
            exit 1
          fi
          echo "::add-mask::$ACCOUNT_ID"
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Resolve Edge Configuration
        id: resolve-edge
        run: |
          # Domain: input > vars.DOMAIN_NAME
          DOMAIN="${{ inputs.domain-name }}"
          if [ -z "$DOMAIN" ]; then DOMAIN="${{ vars.DOMAIN_NAME }}"; fi
          if [ -z "$DOMAIN" ]; then
            echo "ERROR: No domain name. Set DOMAIN_NAME in environment '${{ inputs.environment }}'"
            exit 1
          fi

          # Hosted Zone: input > vars.HOSTED_ZONE_ID
          HZ_ID="${{ inputs.hosted-zone-id }}"
          if [ -z "$HZ_ID" ]; then HZ_ID="${{ vars.HOSTED_ZONE_ID }}"; fi
          if [ -z "$HZ_ID" ]; then
            echo "ERROR: No hosted zone ID. Set HOSTED_ZONE_ID in environment '${{ inputs.environment }}'"
            exit 1
          fi

          # Cross-account role: input > vars.DNS_VALIDATION_ROLE
          ROLE_ARN="${{ inputs.cross-account-role-arn }}"
          if [ -z "$ROLE_ARN" ]; then ROLE_ARN="${{ vars.DNS_VALIDATION_ROLE }}"; fi
          if [ -z "$ROLE_ARN" ]; then
            echo "ERROR: No cross-account role. Set DNS_VALIDATION_ROLE in environment '${{ inputs.environment }}'"
            exit 1
          fi

          echo "domain-name=$DOMAIN" >> $GITHUB_OUTPUT
          echo "hosted-zone-id=$HZ_ID" >> $GITHUB_OUTPUT
          echo "cross-account-role-arn=$ROLE_ARN" >> $GITHUB_OUTPUT
          echo "[OK] Edge config: $DOMAIN (Zone: $HZ_ID)"

      - name: Synthesize & Determine Stack Names
        id: synth
        env:
          DOMAIN_NAME: ${{ steps.resolve-edge.outputs.domain-name }}
          HOSTED_ZONE_ID: ${{ steps.resolve-edge.outputs.hosted-zone-id }}
          CROSS_ACCOUNT_ROLE_ARN: ${{ steps.resolve-edge.outputs.cross-account-role-arn }}
          NOTIFICATION_EMAIL: ${{ vars.NOTIFICATION_EMAIL }}
          SES_FROM_EMAIL: ${{ vars.SES_FROM_EMAIL }}
          VERIFICATION_SECRET: ${{ secrets.VERIFICATION_SECRET }}
          VERIFICATION_BASE_URL: ${{ vars.VERIFICATION_BASE_URL }}
          # ── WAF IP Allowlist (Pre-launch Access Restriction) ─────────
          # Restricts CloudFront access to listed IPs only.
          #
          # GitHub Environment settings (Settings → Environments → development):
          #   Variable: RESTRICT_ACCESS = "true" | "false"
          #   Secret:   ALLOW_IPV4 = "<your-ipv4>/32"  (e.g., "203.0.113.42/32")
          #   Secret:   ALLOW_IPV6 = "<your-ipv6>/128"  (e.g., "2a02:8084::/128")
          #
          # To go live: set RESTRICT_ACCESS to "false" in GitHub Environment
          # variables and re-run the pipeline. No code change, commit, or PR
          # needed — the WAF default action flips from BLOCK to ALLOW.
          #
          # To lock down again: set RESTRICT_ACCESS back to "true".
          # ──────────────────────────────────────────────────────────────
          RESTRICT_ACCESS: ${{ vars.RESTRICT_ACCESS }}
          ALLOW_IPV4: ${{ secrets.ALLOW_IPV4 }}
          ALLOW_IPV6: ${{ secrets.ALLOW_IPV6 }}
        run: just ci-synth kubernetes ${{ inputs.cdk-environment }}

      - name: Cache Synthesized Templates
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: infra/cdk.out/
          key: cdk-synth-k8s-${{ inputs.cdk-environment }}-${{ github.run_id }}-${{ github.run_attempt }}

  # ===========================================================================
  # IaC Security Scan (Conditional)
  # ===========================================================================
  security-scan:
    name: Security Scan
    needs: setup
    if: inputs.enable-security-scan
    uses: ./.github/workflows/_iac-security-scan.yml
    with:
      environment: ${{ inputs.environment }}
      enforce-blocking: ${{ inputs.security-scan-blocking }}
      cdk-output-path: "infra/cdk.out"
      cache-key: cdk-synth-k8s-${{ inputs.cdk-environment }}-${{ github.run_id }}-${{ github.run_attempt }}
      skip-checks: ""
      soft-fail-on: ${{ inputs.security-scan-blocking && '' || 'LOW' }}
    secrets: inherit

  # ===========================================================================
  # Drift Detection (staging/production — informational)
  # ===========================================================================
  # Disabled — CloudFormation provides native drift detection.
  # To re-enable: uncomment the job below and add `drift-detection`
  # back to summary.needs.
  #
  # drift-detection:
  #   name: Drift Detection
  #   needs: [setup]
  #   runs-on: ubuntu-latest
  #   container:
  #     image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
  #   timeout-minutes: 15
  #   environment: ${{ inputs.environment }}
  #   if: needs.setup.result == 'success'
  #
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  #
  #     - name: Setup Environment and Dependencies
  #       uses: ./.github/actions/setup-node-yarn
  #       with:
  #         node-version: ${{ needs.setup.outputs.node-version }}
  #
  #     - name: Install Dependencies
  #       run: yarn install --immutable
  #       working-directory: infra
  #
  #     - name: Configure AWS Credentials
  #       uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
  #       with:
  #         role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
  #         aws-region: ${{ env.AWS_REGION }}
  #         audience: sts.amazonaws.com
  #
  #     - name: Run Drift Detection
  #       run: just ci-drift kubernetes ${{ inputs.cdk-environment }} --region ${{ env.AWS_REGION }}
  #       env:
  #         AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

  # ===========================================================================
  # Template Validation (cfn-lint)
  # ===========================================================================
  validate-templates:
    name: Validate Templates
    needs: [setup]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 10

    steps:
      - name: Checkout Config
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .cfnlintrc
          sparse-checkout-cone-mode: false

      - name: Restore Synthesized Templates
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: infra/cdk.out/
          key: cdk-synth-k8s-${{ inputs.cdk-environment }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Validate CloudFormation Templates
        shell: python3 {0}
        run: |
          import sys, glob
          sys.setrecursionlimit(10000)
          from cfnlint import decode, runner
          from cfnlint.config import ConfigMixIn

          templates = sorted(glob.glob("infra/cdk.out/**/*.template.json", recursive=True))
          print(f"Validating {len(templates)} templates...")
          total_errors = 0
          for tpl in templates:
              print(f"\n--- {tpl} ---")
              try:
                  config = ConfigMixIn(["--template", tpl])
                  matches = list(runner.Runner(config).run())
                  if matches:
                      total_errors += len(matches)
                      for match in matches:
                          print(f"  {match}")
                  else:
                      print("  PASS")
              except RecursionError:
                  print(f"  SKIP (template too deeply nested)")
              except Exception as e:
                  print(f"  SKIP ({type(e).__name__}: {e})")

          if total_errors > 0:
              print(f"\n{total_errors} validation errors found")
              sys.exit(1)
          else:
              print(f"\nAll {len(templates)} templates passed validation")

  # ===========================================================================
  # Deploy Data Stack (1/6) — DynamoDB + S3 + SSM Parameters
  # ===========================================================================
  deploy-data:
    name: Deploy Data
    needs: [setup, validate-templates, security-scan]
    if: >-
      always()
      && needs.setup.result == 'success'
      && needs.validate-templates.result == 'success'
      && (needs.security-scan.result == 'success' || needs.security-scan.result == 'skipped')
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: ${{ needs.setup.outputs.data-stack }}
      project: kubernetes
      environment: ${{ inputs.environment }}
      aws-account-id: ${{ needs.setup.outputs.aws-account-id }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: ${{ inputs.require-approval }}
      outputs-directory: "deployment-outputs"
    secrets: inherit

  # ===========================================================================
  # Verify Data Stack — Integration Tests Gate
  #
  # Runs integration tests that call real AWS APIs to validate the data
  # stack deployment. Reads SSM parameters published by the stack and
  # confirms DynamoDB, S3, and CloudFormation outputs are correctly
  # configured. Gates the base stack deployment.
  # ===========================================================================
  verify-data-stack:
    name: Verify Data Stack
    needs: [setup, deploy-data]
    if: always() && needs.deploy-data.result == 'success'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          audience: sts.amazonaws.com

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Install Dependencies
        run: yarn install --immutable
        working-directory: infra

      - name: Run Data Stack Integration Tests
        env:
          CDK_ENV: ${{ inputs.cdk-environment }}
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
        run: just ci-integration-test kubernetes/data-stack $CDK_ENV --verbose

  # ===========================================================================
  # Verify Golden AMI (post-deploy) — AMI metadata + package verification
  #
  # Runs after deploy-goldenami completes. Verifies the AMI exists, has
  # correct tags, and all expected packages are present in build logs.
  # Replaces the previous golden-ami-observer.ts streaming script.
  # ===========================================================================
  verify-goldenami:
    name: Verify Golden AMI
    needs: [setup, deploy-goldenami]
    if: >-
      always()
      && (needs.deploy-goldenami.result == 'success' || needs.deploy-goldenami.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          audience: sts.amazonaws.com

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Install Dependencies
        run: yarn install --immutable
        working-directory: infra

      - name: Run Golden AMI Integration Tests
        env:
          CDK_ENV: ${{ inputs.cdk-environment }}
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
        run: just ci-integration-test kubernetes/golden-ami-stack $CDK_ENV --verbose

  # ===========================================================================
  # Deploy Base Stack (2/6) — VPC networking + SG + KMS + EBS + EIP
  # ===========================================================================
  deploy-base:
    name: Deploy Base
    needs: [setup, deploy-data, verify-data-stack]
    if: always() && needs.deploy-data.result == 'success' && needs.verify-data-stack.result == 'success'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: ${{ needs.setup.outputs.base-stack }}
      project: kubernetes
      environment: ${{ inputs.environment }}
      aws-account-id: ${{ needs.setup.outputs.aws-account-id }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: ${{ inputs.require-approval }}
      outputs-directory: "deployment-outputs"
    secrets: inherit

  # ===========================================================================
  # Verify Base Stack — Integration Tests Gate
  #
  # Runs integration tests that call real AWS APIs to validate the base
  # stack deployment. Reads SSM parameters published by the stack and
  # confirms VPC, SGs, KMS, EBS, EIP, S3, and Route 53 resources exist
  # and are correctly configured. Gates all downstream stacks.
  # ===========================================================================
  verify-base-stack:
    name: Verify Base Stack
    needs: [setup, deploy-base]
    if: always() && needs.deploy-base.result == 'success'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          audience: sts.amazonaws.com

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Install Dependencies
        run: yarn install --immutable
        working-directory: infra

      - name: Run Base Stack Integration Tests
        env:
          CDK_ENV: ${{ inputs.cdk-environment }}
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
        run: just ci-integration-test kubernetes/base-stack $CDK_ENV --verbose

  # ===========================================================================
  # Deploy Golden AMI Stack (Image Builder Pipeline)
  #
  # Creates the CfnImage resource that builds the Golden AMI inline.
  # CloudFormation triggers Image Builder and waits for the AMI to be
  # built (~15-25 min). The AMI ID is stored in SSM by CloudFormation.
  # ===========================================================================
  deploy-goldenami:
    name: Deploy Golden AMI
    needs: [setup, deploy-base, verify-base-stack]
    if: >-
      always()
      && needs.deploy-base.result == 'success'
      && needs.verify-base-stack.result == 'success'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: ${{ needs.setup.outputs.goldenami-stack }}
      project: kubernetes
      environment: ${{ inputs.environment }}
      aws-account-id: ${{ needs.setup.outputs.aws-account-id }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: ${{ inputs.require-approval }}
      timeout-minutes: 35
      outputs-directory: "deployment-outputs"
    secrets: inherit

  # ===========================================================================
  # Deploy SSM Automation Stack (2d) — SSM Documents + IAM Role
  #
  # Runs in parallel with Golden AMI bake. Deploys the SSM Automation
  # documents and IAM role that the bootstrap-only pipeline uses.
  # ===========================================================================
  deploy-ssm:
    name: Deploy SSM Automation
    needs: [setup, deploy-base, verify-base-stack]
    if: >-
      always()
      && needs.deploy-base.result == 'success'
      && needs.verify-base-stack.result == 'success'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: ${{ needs.setup.outputs.ssmautomation-stack }}
      project: kubernetes
      environment: ${{ inputs.environment }}
      aws-account-id: ${{ needs.setup.outputs.aws-account-id }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: ${{ inputs.require-approval }}
      outputs-directory: "deployment-outputs"
    secrets: inherit

  # ===========================================================================
  # Read SSM Stack Outputs — extract SSM document names from CloudFormation
  # ===========================================================================
  read-ssm-outputs:
    name: Read SSM Stack Outputs
    needs: [setup, deploy-ssm]
    if: needs.deploy-ssm.result == 'success'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}
    outputs:
      control-plane-doc-name: ${{ steps.extract.outputs.control-plane-doc-name }}
      worker-doc-name: ${{ steps.extract.outputs.worker-doc-name }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          audience: sts.amazonaws.com

      - name: Extract SSM Document Names
        id: extract
        run: |
          STACK_NAME="${{ needs.setup.outputs.ssmautomation-stack }}"
          REGION="${{ vars.AWS_REGION || 'eu-west-1' }}"

          echo "Reading outputs from stack: $STACK_NAME"
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output json \
            --region "$REGION" 2>/dev/null || echo "[]")

          CP_DOC=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="ControlPlaneDocName") | .OutputValue // empty' 2>/dev/null || echo "")
          WORKER_DOC=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="WorkerDocName") | .OutputValue // empty' 2>/dev/null || echo "")

          echo "control-plane-doc-name=$CP_DOC" >> $GITHUB_OUTPUT
          echo "worker-doc-name=$WORKER_DOC" >> $GITHUB_OUTPUT

          echo "### SSM Automation Stack Outputs ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Document | Name |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Control Plane | $CP_DOC |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | $WORKER_DOC |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Deploy Compute Stack — Control Plane EC2 + ASG
  #
  # Waits for Golden AMI bake (or skip) so the Launch Template
  # resolves to the latest baked AMI.
  # ===========================================================================
  deploy-controlplane:
    name: Deploy Control Plane
    needs: [setup, deploy-base, verify-base-stack, deploy-goldenami]
    if: >-
      always()
      && needs.deploy-base.result == 'success'
      && needs.verify-base-stack.result == 'success'
      && (needs.deploy-goldenami.result == 'success' || needs.deploy-goldenami.result == 'skipped')
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: ${{ needs.setup.outputs.controlplane-stack }}
      project: kubernetes
      environment: ${{ inputs.environment }}
      aws-account-id: ${{ needs.setup.outputs.aws-account-id }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: ${{ inputs.require-approval }}
      outputs-directory: "deployment-outputs"
    secrets: inherit

  # ===========================================================================
  # Verify Control Plane Stack — Integration Tests Gate
  #
  # Runs integration tests that call real AWS APIs to validate the control
  # plane deployment. Verifies EIP association to the running instance,
  # security group attachment (cluster base, control plane, ingress), port
  # rules on each SG, and CloudFormation outputs. Gates worker deployments.
  # ===========================================================================
  verify-controlplane-stack:
    name: Verify Control Plane
    needs: [setup, deploy-controlplane]
    if: always() && needs.deploy-controlplane.result == 'success'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          audience: sts.amazonaws.com

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Install Dependencies
        run: yarn install --immutable
        working-directory: infra

      - name: Run Control Plane Integration Tests
        env:
          CDK_ENV: ${{ inputs.cdk-environment }}
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
        run: just ci-integration-test kubernetes/control-plane-stack $CDK_ENV --verbose

  # ===========================================================================
  # Deploy App Worker Stack (3b/8) — Application Worker Node
  # ===========================================================================
  deploy-app-worker:
    name: Deploy App Worker
    needs: [setup, deploy-controlplane, verify-controlplane-stack]
    if: always() && needs.deploy-controlplane.result == 'success' && needs.verify-controlplane-stack.result == 'success'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: ${{ needs.setup.outputs.worker-stack }}
      project: kubernetes
      environment: ${{ inputs.environment }}
      aws-account-id: ${{ needs.setup.outputs.aws-account-id }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: ${{ inputs.require-approval }}
      outputs-directory: "deployment-outputs"
    secrets: inherit

  # ===========================================================================
  # Verify App Worker Stack — Integration Tests Gate
  #
  # Runs integration tests that call real AWS APIs to validate the app worker
  # deployment. Verifies security group attachment (cluster base SG only),
  # Source/Dest check disabled (Calico), cluster-base SG port rules (K8s API,
  # kubelet, etcd, VXLAN, BGP, NodePort, CoreDNS, Typha), and CloudFormation
  # outputs. Gates the AppIam deployment.
  # ===========================================================================
  verify-app-worker-stack:
    name: Verify App Worker
    needs: [setup, deploy-app-worker]
    if: always() && needs.deploy-app-worker.result == 'success'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          audience: sts.amazonaws.com

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Install Dependencies
        run: yarn install --immutable
        working-directory: infra

      - name: Run App Worker Integration Tests
        env:
          CDK_ENV: ${{ inputs.cdk-environment }}
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
        run: just ci-integration-test kubernetes/app-worker-stack $CDK_ENV --verbose

  # ===========================================================================
  # Deploy Monitoring Worker Stack (3c/8) — Monitoring Worker Node
  # ===========================================================================
  deploy-monitoring-worker:
    name: Deploy Monitoring Worker
    needs: [setup, deploy-controlplane, verify-controlplane-stack]
    if: always() && needs.deploy-controlplane.result == 'success' && needs.verify-controlplane-stack.result == 'success'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: ${{ needs.setup.outputs.monitoring-worker-stack }}
      project: kubernetes
      environment: ${{ inputs.environment }}
      aws-account-id: ${{ needs.setup.outputs.aws-account-id }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: ${{ inputs.require-approval }}
      outputs-directory: "deployment-outputs"
    secrets: inherit

  # ===========================================================================
  # Verify Monitoring Worker Stack — Integration Tests Gate
  #
  # Runs integration tests that call real AWS APIs to validate the monitoring
  # worker deployment. Verifies security group attachment (cluster base,
  # ingress, monitoring), monitoring SG port rules (Prometheus, Node Exporter,
  # Loki, Tempo), SNS alerts topic, and CloudFormation outputs.
  # Gates the AppIam deployment.
  # ===========================================================================
  verify-monitoring-worker-stack:
    name: Verify Monitoring Worker
    needs: [setup, deploy-monitoring-worker]
    if: always() && needs.deploy-monitoring-worker.result == 'success'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          audience: sts.amazonaws.com

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Install Dependencies
        run: yarn install --immutable
        working-directory: infra

      - name: Run Monitoring Worker Integration Tests
        env:
          CDK_ENV: ${{ inputs.cdk-environment }}
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
        run: just ci-integration-test kubernetes/monitoring-worker-stack $CDK_ENV --verbose

  # ===========================================================================
  # Deploy AppIam Stack (4/8) — Application-tier IAM grants
  # ===========================================================================
  deploy-appiam:
    name: Deploy App IAM
    needs: [setup, deploy-app-worker, deploy-monitoring-worker, verify-app-worker-stack, verify-monitoring-worker-stack]
    if: >-
      always()
      && needs.deploy-app-worker.result == 'success'
      && needs.deploy-monitoring-worker.result == 'success'
      && needs.verify-app-worker-stack.result == 'success'
      && needs.verify-monitoring-worker-stack.result == 'success'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: ${{ needs.setup.outputs.appiam-stack }}
      project: kubernetes
      environment: ${{ inputs.environment }}
      aws-account-id: ${{ needs.setup.outputs.aws-account-id }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: ${{ inputs.require-approval }}
      outputs-directory: "deployment-outputs"
    secrets: inherit

  # ===========================================================================
  # Verify SSM Automation — Integration Tests Gate
  #
  # Runs integration tests that call real AWS APIs to validate that SSM
  # Automation executions (bootstrap + secrets) completed successfully with
  # correct tag-based targeting. Verifies AutomationExecutionStatus,
  # Targets, ResolvedTargets, Outputs, and DocumentName for each document.
  # ===========================================================================
  verify-ssm-automation:
    name: Verify SSM Automation
    needs: [setup, deploy-ssm]
    if: always() && needs.deploy-ssm.result == 'success'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
          audience: sts.amazonaws.com

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Install Dependencies
        run: yarn install --immutable
        working-directory: infra

      - name: Run SSM Automation Integration Tests
        env:
          CDK_ENV: ${{ inputs.cdk-environment }}
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
        run: just ci-integration-test kubernetes/ssm-automation-runtime $CDK_ENV --verbose

  # ===========================================================================
  # Deploy Edge Stack (5/6) — CloudFront + ACM + WAF (us-east-1)
  # Origin: Elastic IP → Traefik
  # ===========================================================================
  deploy-edge:
    name: Deploy Edge
    needs: [setup, deploy-appiam, deploy-data]
    if: always() && needs.deploy-appiam.result == 'success' && needs.deploy-data.result == 'success'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: ${{ needs.setup.outputs.edge-stack }}
      project: kubernetes
      environment: ${{ inputs.environment }}
      aws-account-id: ${{ needs.setup.outputs.aws-account-id }}
      aws-region: ${{ vars.ROUTE53_REGION || 'us-east-1' }}
      require-approval: ${{ inputs.require-approval }}
      outputs-directory: "deployment-outputs"
      domain-name: ${{ needs.setup.outputs.domain-name }}
      hosted-zone-id: ${{ needs.setup.outputs.hosted-zone-id }}
      cross-account-role-arn: ${{ needs.setup.outputs.cross-account-role-arn }}
    secrets: inherit

  # ===========================================================================
  # K8s Manifest Deployment — ArgoCD (GitOps)
  #
  # Application manifests are deployed by ArgoCD running
  # on the kubeadm node. ArgoCD watches this Git repo and auto-syncs changes
  # within ~3 minutes. No CI pipeline jobs needed.
  #
  # See: kubernetes-app/k8s-bootstrap/system/argocd/ for ArgoCD config and Application CRDs.
  # SSM Run Command documents are retained as a fallback for secret updates.
  # ===========================================================================

  # ===========================================================================
  # Deployment Failure Alert (staging/production only)
  #
  # For K8s/GitOps environments, automated CFn rollbacks on stateful infra
  # (EC2 nodes running ArgoCD) risk split-brain state. Instead we:
  #   1. Halt the pipeline
  #   2. Preserve artifacts and diagnostics
  #   3. Alert engineers with actionable context
  #   4. Let them "roll forward" with a targeted fix
  # ===========================================================================
  deployment-failure-alert:
    name: "Deployment Failed — Alert"
    needs:
      [
        setup,
        deploy-ssm,
        deploy-controlplane,
        deploy-app-worker,
        deploy-monitoring-worker,
        deploy-edge,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    if: |
      always()
      && (
        needs.deploy-ssm.result == 'failure'
        || needs.deploy-controlplane.result == 'failure'
        || needs.deploy-app-worker.result == 'failure'
        || needs.deploy-monitoring-worker.result == 'failure'
        || needs.deploy-edge.result == 'failure'
      )
      && inputs.cdk-environment != 'development'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Install Dependencies
        run: yarn install --immutable
        working-directory: ./

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: "Generate Deployment Failure Report"
        continue-on-error: true
        env:
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
          COMMIT_SHA: ${{ needs.setup.outputs.commit-sha }}
          CDK_ENV: ${{ inputs.cdk-environment }}
          JOB_RESULTS: >-
            {
              "control-plane": "${{ needs.deploy-controlplane.result }}",
              "app-worker": "${{ needs.deploy-app-worker.result }}",
              "monitoring-worker": "${{ needs.deploy-monitoring-worker.result }}",
              "edge": "${{ needs.deploy-edge.result || 'skipped' }}"
            }
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_URL: "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
        run: |
          just ci-failure-report \
            --stacks "${{ needs.setup.outputs.data-stack }},${{ needs.setup.outputs.base-stack }},${{ needs.setup.outputs.controlplane-stack }},${{ needs.setup.outputs.worker-stack }},${{ needs.setup.outputs.monitoring-worker-stack }},${{ needs.setup.outputs.appiam-stack }},${{ needs.setup.outputs.edge-stack }}" \
            --region ${{ env.AWS_REGION }} \
            --ssm-prefix "/k8s/${{ inputs.cdk-environment }}"

  # ===========================================================================
  # Deployment Summary (TypeScript)
  # ===========================================================================
  summary:
    name: Deployment Summary
    needs:
      - setup
      - security-scan
      # - drift-detection  # disabled — uncomment when re-enabling
      - deploy-data
      - deploy-ssm
      - deploy-controlplane
      - deploy-goldenami
      - deploy-app-worker
      - deploy-monitoring-worker
      - deploy-edge
      - deployment-failure-alert
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write # OIDC for DescribeStacks verification
      contents: read

    steps:
      # Guard: if setup was cancelled/failed, write minimal fallback
      - name: Check Prerequisites
        id: prereqs
        run: |
          if [ "${{ needs.setup.result }}" != "success" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Pipeline Aborted

          **Reason**: Setup job did not complete successfully (`${{ needs.setup.result }}`)
          **Commit**: `${{ github.sha }}`
          **Environment**: ${{ inputs.environment }}

          No stacks were deployed. Check the setup job logs for details.
          EOF
            echo "::warning::Setup did not succeed (${{ needs.setup.result }}), skipping full summary"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.prereqs.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment and Dependencies
        if: steps.prereqs.outputs.skip != 'true'
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ needs.setup.outputs.node-version }}

      - name: Install Dependencies
        if: steps.prereqs.outputs.skip != 'true'
        run: yarn install --immutable
        working-directory: infra

      - name: Configure AWS Credentials
        if: steps.prereqs.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Audit CloudWatch Log Groups
        if: steps.prereqs.outputs.skip != 'true'
        continue-on-error: true
        run: just ci-log-audit --region ${{ env.AWS_REGION }}

      - name: Generate Summary
        if: steps.prereqs.outputs.skip != 'true'
        env:
          DEPLOY_DATA_RESULT: ${{ needs.deploy-data.result }}
          DEPLOY_CONTROLPLANE_RESULT: ${{ needs.deploy-controlplane.result }}
          DEPLOY_WORKER_RESULT: ${{ needs.deploy-app-worker.result || 'skipped' }}
          DEPLOY_MON_WORKER_RESULT: ${{ needs.deploy-monitoring-worker.result || 'skipped' }}
          DEPLOY_EDGE_RESULT: ${{ needs.deploy-edge.result || 'skipped' }}
          SECURITY_SCAN_RESULT: ${{ needs.security-scan.result || 'skipped' }}
          VERIFY_RESULT: "moved-to-ssm-pipeline"
          SMOKE_TESTS_RESULT: "moved-to-ssm-pipeline"
          ALERT_RESULT: ${{ needs.deployment-failure-alert.result || 'skipped' }}
          COMMIT_SHORT_SHA: ${{ needs.setup.outputs.commit-short-sha }}
        run: just ci-summary kubernetes ${{ inputs.cdk-environment }}
