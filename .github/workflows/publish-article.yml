# =============================================================================
# Workflow: Verify Article Pipeline Readiness
# =============================================================================
#
# Pre-flight verification for the multi-agent article pipeline.
# Ensures all infrastructure is correctly deployed and ready for the
# admin dashboard to trigger article generation via Step Functions.
#
# This workflow does NOT trigger article creation — the admin dashboard
# handles that. It verifies:
#   1. SSM parameters are resolvable (DynamoDB table, S3 bucket, SFN ARN)
#   2. Step Functions state machine exists and is ACTIVE
#   3. All 5 agent Lambdas are deployed and configured
#   4. DynamoDB table is accessible
#   5. S3 bucket prefixes are reachable
#
# Run this after deploying Bedrock infrastructure to confirm readiness.
# =============================================================================

name: Verify Article Pipeline

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: verify-article-pipeline
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  SSM_PREFIX: bedrock-dev

jobs:
  verify:
    name: Pipeline Readiness Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: development

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ------------------------------------------------------------------
      # 2. AWS Credentials (OIDC)
      # ------------------------------------------------------------------
      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      # ------------------------------------------------------------------
      # 3. Resolve SSM Parameters
      # ------------------------------------------------------------------
      - name: Resolve Infrastructure
        id: infra
        run: |
          echo "## 🔍 SSM Parameter Resolution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          SSM_OK=0
          SSM_FAIL=0

          resolve_param() {
            local PARAM_NAME="$1"
            local OUTPUT_KEY="$2"

            VALUE=$(aws ssm get-parameter \
              --name "/${{ env.SSM_PREFIX }}/${PARAM_NAME}" \
              --query 'Parameter.Value' --output text 2>/dev/null || echo "")

            if [ -n "$VALUE" ]; then
              echo "::add-mask::$VALUE"
              echo "${OUTPUT_KEY}=${VALUE}" >> $GITHUB_OUTPUT
              echo "| \`${PARAM_NAME}\` | ✅ Resolved |" >> $GITHUB_STEP_SUMMARY
              SSM_OK=$((SSM_OK + 1))
            else
              echo "| \`${PARAM_NAME}\` | ❌ **Not found** |" >> $GITHUB_STEP_SUMMARY
              SSM_FAIL=$((SSM_FAIL + 1))
            fi
          }

          resolve_param "content-table-name" "table_name"
          resolve_param "content-table-arn" "table_arn"
          resolve_param "assets-bucket-name" "bucket_name"
          resolve_param "pipeline-publish-function-arn" "publisher_arn"
          resolve_param "pipeline-state-machine-arn" "sfn_arn"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ssm_ok=$SSM_OK" >> $GITHUB_OUTPUT
          echo "ssm_fail=$SSM_FAIL" >> $GITHUB_OUTPUT

          if [ "$SSM_FAIL" -gt 0 ]; then
            echo "::warning::${SSM_FAIL} SSM parameter(s) not found"
          fi

      # ------------------------------------------------------------------
      # 4. Verify Step Functions State Machine
      # ------------------------------------------------------------------
      - name: Verify Step Functions
        id: sfn
        run: |
          SFN_ARN="${{ steps.infra.outputs.sfn_arn }}"
          echo "## ⚡ Step Functions State Machine" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -z "$SFN_ARN" ]; then
            echo "- ❌ State machine ARN not found in SSM" >> $GITHUB_STEP_SUMMARY
            echo "sfn_status=missing" >> $GITHUB_OUTPUT
            exit 0
          fi

          SFN_STATUS=$(aws stepfunctions describe-state-machine \
            --state-machine-arn "$SFN_ARN" \
            --query 'status' --output text 2>/dev/null || echo "NOT_FOUND")

          SFN_NAME=$(aws stepfunctions describe-state-machine \
            --state-machine-arn "$SFN_ARN" \
            --query 'name' --output text 2>/dev/null || echo "unknown")

          if [ "$SFN_STATUS" = "ACTIVE" ]; then
            echo "- ✅ **${SFN_NAME}** — Status: \`${SFN_STATUS}\`" >> $GITHUB_STEP_SUMMARY
            echo "sfn_status=active" >> $GITHUB_OUTPUT
          else
            echo "- ❌ **${SFN_NAME}** — Status: \`${SFN_STATUS}\`" >> $GITHUB_STEP_SUMMARY
            echo "sfn_status=${SFN_STATUS}" >> $GITHUB_OUTPUT
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      # ------------------------------------------------------------------
      # 5. Verify Agent Lambdas
      # ------------------------------------------------------------------
      - name: Verify Agent Lambdas
        id: lambdas
        run: |
          PREFIX="${{ env.SSM_PREFIX }}"
          # Pipeline Lambda naming convention: {prefix}-pipeline-{agent}
          AGENTS=("trigger" "research" "writer" "qa" "publish")

          echo "## 🤖 Agent Lambda Functions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Agent | Function | Status | Memory |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|----------|--------|--------|" >> $GITHUB_STEP_SUMMARY

          LAMBDA_OK=0
          LAMBDA_FAIL=0

          for AGENT in "${AGENTS[@]}"; do
            FN_NAME="${PREFIX}-pipeline-${AGENT}"

            RESULT=$(aws lambda get-function-configuration \
              --function-name "$FN_NAME" \
              --query '{State: State, MemorySize: MemorySize, Runtime: Runtime}' \
              --output json 2>/dev/null || echo '{"State":"NOT_FOUND"}')

            STATE=$(echo "$RESULT" | jq -r '.State')
            MEMORY=$(echo "$RESULT" | jq -r '.MemorySize // "N/A"')

            if [ "$STATE" = "Active" ]; then
              echo "| ${AGENT^} | \`${FN_NAME}\` | ✅ Active | ${MEMORY} MB |" >> $GITHUB_STEP_SUMMARY
              LAMBDA_OK=$((LAMBDA_OK + 1))
            else
              echo "| ${AGENT^} | \`${FN_NAME}\` | ❌ ${STATE} | — |" >> $GITHUB_STEP_SUMMARY
              LAMBDA_FAIL=$((LAMBDA_FAIL + 1))
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "lambda_ok=$LAMBDA_OK" >> $GITHUB_OUTPUT
          echo "lambda_fail=$LAMBDA_FAIL" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # 6. Verify DynamoDB Table
      # ------------------------------------------------------------------
      - name: Verify DynamoDB Table
        id: ddb
        run: |
          TABLE="${{ steps.infra.outputs.table_name }}"
          echo "## 🗄️ DynamoDB Table" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -z "$TABLE" ]; then
            echo "- ❌ Table name not found in SSM" >> $GITHUB_STEP_SUMMARY
            echo "ddb_status=missing" >> $GITHUB_OUTPUT
            exit 0
          fi

          TABLE_STATUS=$(aws dynamodb describe-table \
            --table-name "$TABLE" \
            --query 'Table.TableStatus' --output text 2>/dev/null || echo "NOT_FOUND")

          ITEM_COUNT=$(aws dynamodb describe-table \
            --table-name "$TABLE" \
            --query 'Table.ItemCount' --output text 2>/dev/null || echo "0")

          if [ "$TABLE_STATUS" = "ACTIVE" ]; then
            echo "- ✅ **${TABLE}** — Status: \`ACTIVE\`, Items: ${ITEM_COUNT}" >> $GITHUB_STEP_SUMMARY
            echo "ddb_status=active" >> $GITHUB_OUTPUT
          else
            echo "- ❌ **${TABLE}** — Status: \`${TABLE_STATUS}\`" >> $GITHUB_STEP_SUMMARY
            echo "ddb_status=${TABLE_STATUS}" >> $GITHUB_OUTPUT
          fi

          # Show existing articles
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Existing Articles" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          aws dynamodb scan --table-name "$TABLE" \
            --filter-expression "sk = :sk" \
            --expression-attribute-values '{":sk":{"S":"METADATA"}}' \
            --projection-expression "pk, title, updatedAt" \
            --max-items 10 \
            --output json 2>/dev/null | jq -c '.Items[] | {slug: .pk.S, title: .title.S, updated: .updatedAt.S}' >> $GITHUB_STEP_SUMMARY || echo "(no records)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      # ------------------------------------------------------------------
      # 7. Verify S3 Bucket Prefixes
      # ------------------------------------------------------------------
      - name: Verify S3 Bucket
        id: s3
        run: |
          BUCKET="${{ steps.infra.outputs.bucket_name }}"
          echo "## 📦 S3 Bucket Prefixes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -z "$BUCKET" ]; then
            echo "- ❌ Bucket name not found in SSM" >> $GITHUB_STEP_SUMMARY
            echo "s3_status=missing" >> $GITHUB_OUTPUT
            exit 0
          fi

          PREFIXES=("drafts/" "published/" "review/" "content/" "knowledge-base/")

          echo "| Prefix | Status | Object Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|-------------|" >> $GITHUB_STEP_SUMMARY

          for PREFIX in "${PREFIXES[@]}"; do
            COUNT=$(aws s3api list-objects-v2 \
              --bucket "$BUCKET" \
              --prefix "$PREFIX" \
              --max-keys 100 \
              --query 'KeyCount' --output text 2>/dev/null || echo "0")

            if [ "$COUNT" != "0" ] && [ "$COUNT" != "None" ]; then
              echo "| \`${PREFIX}\` | ✅ Accessible | ${COUNT} object(s) |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`${PREFIX}\` | ⚠️ Empty | 0 |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "s3_status=ok" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # 8. Final Readiness Summary
      # ------------------------------------------------------------------
      - name: Pipeline Readiness Report
        run: |
          SSM_FAIL="${{ steps.infra.outputs.ssm_fail }}"
          SFN_STATUS="${{ steps.sfn.outputs.sfn_status }}"
          LAMBDA_OK="${{ steps.lambdas.outputs.lambda_ok }}"
          LAMBDA_FAIL="${{ steps.lambdas.outputs.lambda_fail }}"
          DDB_STATUS="${{ steps.ddb.outputs.ddb_status }}"

          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🏁 Pipeline Readiness" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # SSM
          if [ "$SSM_FAIL" = "0" ]; then
            echo "| SSM Parameters | ✅ All resolved |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SSM Parameters | ❌ ${SSM_FAIL} missing |" >> $GITHUB_STEP_SUMMARY
          fi

          # Step Functions
          if [ "$SFN_STATUS" = "active" ]; then
            echo "| Step Functions | ✅ Active |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Step Functions | ❌ ${SFN_STATUS} |" >> $GITHUB_STEP_SUMMARY
          fi

          # Lambdas
          if [ "$LAMBDA_FAIL" = "0" ] && [ "$LAMBDA_OK" != "0" ]; then
            echo "| Agent Lambdas | ✅ ${LAMBDA_OK}/5 active |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Agent Lambdas | ❌ ${LAMBDA_FAIL} not found |" >> $GITHUB_STEP_SUMMARY
          fi

          # DynamoDB
          if [ "$DDB_STATUS" = "active" ]; then
            echo "| DynamoDB Table | ✅ Active |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| DynamoDB Table | ❌ ${DDB_STATUS} |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall verdict
          if [ "$SSM_FAIL" = "0" ] && [ "$SFN_STATUS" = "active" ] && \
             [ "$LAMBDA_FAIL" = "0" ] && [ "$DDB_STATUS" = "active" ]; then
            echo "### ✅ Pipeline is READY for admin dashboard triggers" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Pipeline has issues — review above checks" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Run \`deploy-bedrock.yml\` to deploy missing infrastructure." >> $GITHUB_STEP_SUMMARY
          fi
