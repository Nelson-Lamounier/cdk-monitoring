# =============================================================================
# Orchestrator: Deploy Next.js Frontend (Development)
# =============================================================================
#
# Unified pipeline that builds, pushes, syncs, and migrates the Next.js
# frontend application for the development environment.
#
# This pipeline lives in cdk-monitoring (infrastructure orchestrator) and
# checks out the private frontend-portfolio repo for building.
#
# Trigger methods:
#   1. Manual: workflow_dispatch from GitHub UI
#   2. Cross-repo: repository_dispatch from frontend-portfolio CI
#   3. Schedule: after Kubernetes infra deployment (called by _deploy-kubernetes.yml)
#
# Flow:
#   build-image → push-to-ecr → sync-static-assets
#                              → deploy-nextjs-secrets (via SSM)
#               → migrate-articles (independent)
# =============================================================================

name: "Deploy Frontend (Dev)"

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      frontend-ref:
        description: "Git ref to build from frontend-portfolio (branch, tag, SHA)"
        required: false
        default: "main"
        type: string
      skip-migration:
        description: "Skip article migration"
        required: false
        default: false
        type: boolean

  # Cross-repo trigger from frontend-portfolio CI
  repository_dispatch:
    types: [deploy-nextjs-dev]

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: development
  AWS_REGION: 'eu-west-1'

jobs:
  # ===========================================================================
  # Job 1: Build and Push Docker Image
  # ===========================================================================
  build-and-push:
    name: Build & Push Image
    uses: ./.github/workflows/_build-push-image.yml
    with:
      environment: development
      image-tag: ${{ github.sha }}-r${{ github.run_attempt }}
      ssm-ecr-param: /shared/ecr/development/repository-uri
      frontend-repo: Nelson-Lamounier/frontend-portfolio
      frontend-ref: ${{ github.event.inputs.frontend-ref || github.event.client_payload.ref || 'main' }}
      push-to-dockerhub: false
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}
      CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}

  # ===========================================================================
  # Job 2: Sync Static Assets to S3 + CloudFront
  # Runs after build (needs the Docker image artifact)
  # ===========================================================================
  sync-assets:
    name: Sync Static Assets
    needs: [build-and-push]
    uses: ./.github/workflows/_sync-assets.yml
    with:
      environment: development
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Job 3: Deploy to Kubernetes via SSM Send-Command
  # Runs after build (needs the ECR image URI)
  # ===========================================================================
  deploy-to-cluster:
    name: Deploy to Kubernetes
    needs: [build-and-push, sync-assets]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Image URI
        id: resolve-image
        run: |
          # Construct image URI from SSM + composite tag (sha-rN)
          # Composite tag prevents ECR overwrites on pipeline retries
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "::error::ECR repository URL not found in SSM: /shared/ecr/${{ env.ENVIRONMENT }}/repository-uri"
            exit 1
          fi

          IMAGE_TAG="${{ github.sha }}-r${{ github.run_attempt }}"
          IMAGE_URI="${ECR_URL}:${IMAGE_TAG}"
          echo "::add-mask::$ECR_URL"
          echo "::add-mask::$IMAGE_URI"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "[PASS] Resolved image URI from SSM (tag: ${IMAGE_TAG})"

      - name: Update SSM for ArgoCD
        run: |
          IMAGE_URI="${{ steps.resolve-image.outputs.image-uri }}"
          echo "Deploying image to Kubernetes..."

          # Update the SSM parameter with the new image URI so ArgoCD
          # picks it up on next sync
          aws ssm put-parameter \
            --name "/nextjs/${{ env.ENVIRONMENT }}/image-uri" \
            --value "$IMAGE_URI" \
            --type String \
            --overwrite

          echo "[PASS] Image URI updated in SSM"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Kubernetes Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: Updated in SSM ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **SSM Parameter Updated**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD Image Updater will detect the new tag and trigger BlueGreen promotion." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job 4: Migrate Articles (independent — can run in parallel with deploy)
  # ===========================================================================
  migrate-articles:
    name: Migrate Articles
    if: ${{ !inputs.skip-migration && github.event_name != 'repository_dispatch' || github.event.client_payload.migrate == true }}
    uses: ./.github/workflows/_migrate-articles.yml
    with:
      environment: development
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}
      CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}

  # ===========================================================================
  # Job 5: Summary
  # ===========================================================================
  summary:
    name: Deployment Summary
    needs: [build-and-push, sync-assets, deploy-to-cluster]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate Summary
        run: |
          echo "## Next.js Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sync Assets | ${{ needs.sync-assets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy to K8s | ${{ needs.deploy-to-cluster.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build-and-push.result }}" = "failure" ] || \
             [ "${{ needs.sync-assets.result }}" = "failure" ] || \
             [ "${{ needs.deploy-to-cluster.result }}" = "failure" ]; then
            echo "**Result: FAILED** — check individual job logs above" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "**Result: SUCCESS**" >> $GITHUB_STEP_SUMMARY
