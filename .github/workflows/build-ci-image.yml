# =============================================================================
# Build and Publish CI Runner Image to GHCR
# =============================================================================
#
# Triggers:
#   - Push to develop/main when .github/docker/ci/** files change
#   - Manual dispatch
#
# Publishes to: ghcr.io/<owner>/cdk-monitoring/ci:latest
# =============================================================================

name: Build CI Image

on:
  push:
    paths:
      - ".github/docker/ci/**"
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push CI Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Image Metadata
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO_LOWER}/ci"

          # Tags: latest + short SHA + date
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE=$(date -u +%Y%m%d)

          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tags=${IMAGE}:latest,${IMAGE}:${SHORT_SHA},${IMAGE}:${BUILD_DATE}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .github/docker/ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "## CI Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.meta.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tool Versions Baked In" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | 22 |" >> $GITHUB_STEP_SUMMARY
          echo "| Just | 1.46.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm | 3.17.1 |" >> $GITHUB_STEP_SUMMARY
          echo "| AWS CLI | v2 (latest) |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | 3 |" >> $GITHUB_STEP_SUMMARY
          echo "| checkov | latest |" >> $GITHUB_STEP_SUMMARY
          echo "| cfn-lint | latest |" >> $GITHUB_STEP_SUMMARY
