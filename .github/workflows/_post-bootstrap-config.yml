# @format
# @description Reusable Post-Bootstrap Configuration Workflow
#
# ─── Purpose ───────────────────────────────────────────────────────
# Deploys application secrets and verifies ArgoCD health.
# Runs after K8s bootstrap (SSM Automation) or independently to
# re-deploy secrets without re-triggering the heavy bootstrap process.
#
# ─── Job Flow ──────────────────────────────────────────────────────
#   deploy-secrets → verify
#
#   1. deploy-secrets  - Deploy Next.js + monitoring K8s Secrets via
#                        the consolidated k8s-deploy-secrets SSM
#                        Automation document (2-step sequence)
#   2. verify          - ArgoCD health + K8s smoke tests
#
# ─── Usage ─────────────────────────────────────────────────────────
#   Called by:
#     - _deploy-ssm-automation.yml  (Phase 6, after bootstrap completes)
#     - deploy-post-bootstrap.yml   (standalone for secret-only updates)
#
# ─── SSM Document Consolidation ───────────────────────────────────
#   Both Next.js and monitoring secrets are deployed via a single
#   SSM Automation document (k8s-deploy-secrets) with 2 steps.
#   The document name is resolved from SSM parameter:
#     /k8s/<env>/deploy/secrets-doc-name
#
#   Each CI deploy script triggers the document with app-specific
#   parameters (app name, SSM paths) — the document handles S3 sync
#   of deploy scripts and Python execution on the control plane.

name: Post-Bootstrap Config (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (development, staging, production)"
        required: true
        type: string
      cdk-environment:
        description: "CDK environment name (used by verify steps)"
        required: true
        type: string
    secrets:
      AWS_OIDC_ROLE:
        description: "AWS OIDC role ARN"
        required: false

permissions:
  id-token: write   # Required for OIDC → aws-actions/configure-aws-credentials
  contents: read    # Required for actions/checkout

env:
  NODE_VERSION: "22"
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  # ===========================================================================
  # Deploy Secrets — Next.js + Monitoring via consolidated SSM Document
  #
  # Triggers the k8s-deploy-secrets SSM Automation document twice:
  #   Step 1: Next.js secrets (SSM → K8s Secret in nextjs namespace)
  #   Step 2: Monitoring secrets (grafana-admin-password, github-token
  #           → K8s Secrets + Helm chart + Grafana password reset)
  #
  # Both scripts resolve the document name from the same SSM parameter:
  #   /k8s/<env>/deploy/secrets-doc-name
  #
  # Visible in: AWS Console → Systems Manager → Automation → Executions
  # ===========================================================================
  deploy-secrets:
    name: Deploy Secrets (Next.js + Monitoring)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js & Install dependencies
        uses: ./.github/actions/setup-node-yarn

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      # -----------------------------------------------------------------------
      # Step 1 — Deploy Next.js Secrets
      #
      # Triggers k8s-deploy-secrets SSM Automation document to execute
      # deploy.py on the control plane. Resolves SSM parameters for
      # Next.js app config and creates/updates the nextjs-secrets
      # K8s Secret in the nextjs namespace.
      # -----------------------------------------------------------------------
      - name: "Step 1 — Deploy Next.js Secrets"
        run: |
          just ci-deploy-nextjs-secrets \
            --environment ${{ inputs.environment }} \
            --region ${{ vars.AWS_REGION || 'eu-west-1' }}

      # -----------------------------------------------------------------------
      # Step 2 — Deploy Monitoring Secrets
      #
      # Same SSM Automation document, different parameters. Resolves
      # grafana-admin-password and github-token from SSM, creates/updates
      # K8s Secrets, deploys Helm chart, and resets Grafana password.
      # -----------------------------------------------------------------------
      - name: "Step 2 — Deploy Monitoring Secrets"
        run: >-
          just ci-deploy-monitoring-secrets
          --environment ${{ inputs.environment }}
          --region ${{ vars.AWS_REGION || 'eu-west-1' }}

      # -----------------------------------------------------------------------
      # Step 3 — Deploy Start-Admin Secrets
      #
      # Triggers the same consolidated SSM Automation document with
      # AppName=start-admin. Runs deploy.py on the control-plane to
      # create/update the start-admin-secrets K8s Secret in the
      # start-admin namespace. Resolves Cognito, DynamoDB, Bedrock,
      # and Lambda ARN parameters from SSM.
      # -----------------------------------------------------------------------
      - name: "Step 3 — Deploy Start-Admin Secrets"
        run: |
          just ci-deploy-admin-secrets \
            --environment ${{ inputs.environment }} \
            --region ${{ vars.AWS_REGION || 'eu-west-1' }}

  # ===========================================================================
  # Verify & Smoke Tests
  #
  # Runs after secret deployment completes. Verifies ArgoCD server health,
  # runs K8s infrastructure smoke tests, and captures diagnostics on failure.
  # Skipped on Day-0 when no ArgoCD token exists yet.
  # ===========================================================================
  verify:
    name: Verify & Smoke Tests
    needs: [deploy-secrets]
    if: >-
      always()
      && (needs.deploy-secrets.result == 'success' || needs.deploy-secrets.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for ArgoCD Token
        id: argocd-token
        continue-on-error: true # Day-0: token may not exist on first deployment
        run: |
          SECRET_NAME="k8s/${{ inputs.cdk-environment }}/argocd-ci-token"
          MAX_ATTEMPTS=20
          INTERVAL=30

          # Mask Secrets Manager name to avoid exposing naming convention
          echo "::add-mask::$SECRET_NAME"

          echo "Polling Secrets Manager for ArgoCD CI token..."
          echo "  Max wait: $(( MAX_ATTEMPTS * INTERVAL ))s"
          echo ""

          for i in $(seq 1 $MAX_ATTEMPTS); do
            TOKEN=$(aws secretsmanager get-secret-value \
              --secret-id "$SECRET_NAME" \
              --query SecretString --output text 2>/dev/null || echo "")

            if [ -n "$TOKEN" ]; then
              echo "::add-mask::$TOKEN"
              echo "token=$TOKEN" >> $GITHUB_OUTPUT
              echo "[OK] ArgoCD token retrieved (attempt $i/${MAX_ATTEMPTS})"
              exit 0
            fi

            echo "Attempt $i/${MAX_ATTEMPTS} — token not ready, waiting ${INTERVAL}s..."
            sleep $INTERVAL
          done

          echo "::warning::ArgoCD token not found after ${MAX_ATTEMPTS} attempts — Day-0 bootstrap; skipping ArgoCD verification"

      # -----------------------------------------------------------------------
      # ArgoCD Server Health (via SSM send-command)
      #
      # Verifies the ArgoCD SERVER is reachable after bootstrap.
      # Uses the same verify-argocd-sync.ts script in --mode health,
      # which runs curl on the control plane node via SSM send-command.
      #
      # On Day-0 (no token), this step is skipped gracefully.
      # -----------------------------------------------------------------------
      - name: "ArgoCD Server Health"
        if: steps.argocd-token.outputs.token != '' && steps.argocd-token.outcome == 'success'
        env:
          ARGOCD_TOKEN: ${{ steps.argocd-token.outputs.token }}
        run: |
          just ci-argocd-health \
            --environment ${{ inputs.cdk-environment }} \
            --region ${{ env.AWS_REGION }} \
            --max-polls 6 \
            --poll-interval 20

      - name: Run K8s Smoke Tests
        id: smoke
        run: |
          SMOKE_CMD="just ci-smoke-kubernetes-infra ${{ inputs.cdk-environment }} --region ${{ env.AWS_REGION }}"
          eval $SMOKE_CMD

      # -----------------------------------------------------------------------
      # Failure Diagnostics — K8s state + boot logs on failure
      # -----------------------------------------------------------------------
      - name: "Capture Failure Diagnostics"
        if: failure()
        continue-on-error: true
        run: |
          echo "## Failure Diagnostics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${{ inputs.environment }} | **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SSM_PREFIX="/k8s/${{ inputs.cdk-environment }}"
          REGION="${{ env.AWS_REGION }}"

          # Resolve control-plane instance ID
          INSTANCE_ID=$(aws ssm get-parameter \
            --name "${SSM_PREFIX}/bootstrap/control-plane-instance-id" \
            --query 'Parameter.Value' --output text \
            --region "$REGION" 2>/dev/null || echo "")

          if [ -n "$INSTANCE_ID" ]; then
            # Mask instance ID to prevent infrastructure enumeration
            echo "::add-mask::$INSTANCE_ID"

            echo "### K8s Pod Status (non-Running)" >> $GITHUB_STEP_SUMMARY
            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["sudo kubectl get pods -A --field-selector=status.phase!=Running -o wide 2>/dev/null || echo No kubectl access"]' \
              --query 'Command.CommandId' --output text \
              --region "$REGION" 2>/dev/null || echo "")
            if [ -n "$CMD_ID" ]; then
              sleep 10
              POD_OUTPUT=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                --query 'StandardOutputContent' --output text \
                --region "$REGION" 2>/dev/null || echo "Could not retrieve")
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$POD_OUTPUT" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "_Could not resolve instance ID from SSM — skipping K8s diagnostics_" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "Fetch Boot Logs from CloudWatch"
        if: failure()
        continue-on-error: true
        run: just ci-fetch-boot-logs ${{ inputs.cdk-environment }} --region ${{ env.AWS_REGION }}
