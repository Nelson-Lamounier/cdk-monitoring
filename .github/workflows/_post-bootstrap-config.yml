# @format
# @description Reusable Post-Bootstrap Configuration Workflow
#
# ─── Purpose ───────────────────────────────────────────────────────
# Deploys application secrets and verifies ArgoCD health.
# Runs after K8s bootstrap (SSM Automation) or independently to
# re-deploy secrets without re-triggering the heavy bootstrap process.
#
# ─── Job Flow ──────────────────────────────────────────────────────
#   deploy-secrets → verify
#
#   1. deploy-secrets  - Deploy all app secrets (nextjs + monitoring +
#                        start-admin) via a SINGLE SSM Automation
#                        execution of the consolidated k8s-deploy-secrets
#                        document (3-step sequence on the control plane).
#   2. verify          - ArgoCD health + IngressRoute origin-secret check
#                        + K8s smoke tests
#
# ─── Usage ─────────────────────────────────────────────────────────
#   Called by:
#     - _deploy-ssm-automation.yml  (Phase 6, after bootstrap completes)
#     - deploy-post-bootstrap.yml   (standalone for secret-only updates)
#
# ─── SSM Document Consolidation ───────────────────────────────────
#   All three app secrets are deployed via a SINGLE ci-deploy-nextjs-secrets
#   invocation.  The k8s-deploy-secrets document executes all three deploy.py
#   scripts sequentially on the control-plane node:
#     Step 1: nextjs/deploy.py     — K8s Secret + ArgoCD cloudfront.originSecret
#     Step 2: monitoring/deploy.py — K8s Secrets + Helm chart + Grafana reset
#     Step 3: start-admin/deploy.py — K8s Secret (Cognito / DynamoDB / Bedrock)
#
#   The document name is resolved from SSM parameter:
#     /k8s/<env>/deploy/secrets-doc-name
#
#   Each CI deploy script triggers the document with app-specific
#   parameters (app name, SSM paths) — the document handles S3 sync
#   of deploy scripts and Python execution on the control plane.

name: Post-Bootstrap Config (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (development, staging, production)"
        required: true
        type: string
      cdk-environment:
        description: "CDK environment name (used by verify steps)"
        required: true
        type: string
    secrets:
      AWS_OIDC_ROLE:
        description: "AWS OIDC role ARN"
        required: false

permissions:
  id-token: write   # Required for OIDC → aws-actions/configure-aws-credentials
  contents: read    # Required for actions/checkout

env:
  NODE_VERSION: "22"
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  # ===========================================================================
  # Deploy Secrets — All applications via the consolidated SSM Document
  #
  # The k8s-deploy-secrets SSM Automation document runs ALL THREE deploy.py
  # scripts sequentially on the control-plane node:
  #   Step 1: nextjs/deploy.py     — nextjs-secrets K8s Secret + ArgoCD patch
  #   Step 2: monitoring/deploy.py — grafana + github K8s Secrets + Helm chart
  #   Step 3: start-admin/deploy.py — start-admin-secrets K8s Secret
  #
  # A single ci-deploy-nextjs-secrets invocation triggers the full 3-step
  # document.  Triggering the document three times (one per app) is redundant
  # and was masking failures by generating 3x green ticks for the same execution.
  #
  # Document name resolved from SSM: /k8s/<env>/deploy/secrets-doc-name
  # Visible in: AWS Console → Systems Manager → Automation → Executions
  # ===========================================================================
  deploy-secrets:
    name: Deploy Secrets (All Apps — Consolidated)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js & Install dependencies
        uses: ./.github/actions/setup-node-yarn

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      # -----------------------------------------------------------------------
      # Deploy All Secrets — single SSM Automation execution
      #
      # Triggers the k8s-deploy-secrets document ONCE.  The document executes
      # all three deploy.py scripts in sequence on the control-plane:
      #   1. nextjs/deploy.py     — K8s Secret + ArgoCD cloudfront.originSecret patch
      #   2. monitoring/deploy.py — K8s Secrets + Helm chart + Grafana password reset
      #   3. start-admin/deploy.py — K8s Secret for Cognito / DynamoDB / Bedrock
      #
      # deploy.py Step 5 now exits 1 on any ArgoCD patch failure, which causes
      # the SSM step to fail and surfaces the error here immediately.
      # -----------------------------------------------------------------------
      - name: "Deploy All Secrets (nextjs + monitoring + start-admin)"
        run: |
          just ci-deploy-nextjs-secrets \
            --environment ${{ inputs.environment }} \
            --region ${{ vars.AWS_REGION || 'eu-west-1' }}


  # ===========================================================================
  # Verify & Smoke Tests
  #
  # Runs after secret deployment completes. Verifies ArgoCD server health,
  # runs K8s infrastructure smoke tests, and captures diagnostics on failure.
  # Skipped on Day-0 when no ArgoCD token exists yet.
  # ===========================================================================
  verify:
    name: Verify & Smoke Tests
    needs: [deploy-secrets]
    if: >-
      always()
      && (needs.deploy-secrets.result == 'success' || needs.deploy-secrets.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for ArgoCD Token
        id: argocd-token
        continue-on-error: true # Day-0: token may not exist on first deployment
        run: |
          SECRET_NAME="k8s/${{ inputs.cdk-environment }}/argocd-ci-token"
          MAX_ATTEMPTS=20
          INTERVAL=30

          # Mask Secrets Manager name to avoid exposing naming convention
          echo "::add-mask::$SECRET_NAME"

          echo "Polling Secrets Manager for ArgoCD CI token..."
          echo "  Max wait: $(( MAX_ATTEMPTS * INTERVAL ))s"
          echo ""

          for i in $(seq 1 $MAX_ATTEMPTS); do
            TOKEN=$(aws secretsmanager get-secret-value \
              --secret-id "$SECRET_NAME" \
              --query SecretString --output text 2>/dev/null || echo "")

            if [ -n "$TOKEN" ]; then
              echo "::add-mask::$TOKEN"
              echo "token=$TOKEN" >> $GITHUB_OUTPUT
              echo "[OK] ArgoCD token retrieved (attempt $i/${MAX_ATTEMPTS})"
              exit 0
            fi

            echo "Attempt $i/${MAX_ATTEMPTS} — token not ready, waiting ${INTERVAL}s..."
            sleep $INTERVAL
          done

          echo "::warning::ArgoCD token not found after ${MAX_ATTEMPTS} attempts — Day-0 bootstrap; skipping ArgoCD verification"

      # -----------------------------------------------------------------------
      # ArgoCD Server Health (via SSM send-command)
      #
      # Verifies the ArgoCD SERVER is reachable after bootstrap.
      # Uses the same verify-argocd-sync.ts script in --mode health,
      # which runs curl on the control plane node via SSM send-command.
      #
      # On Day-0 (no token), this step is skipped gracefully.
      # -----------------------------------------------------------------------
      - name: "ArgoCD Server Health"
        if: steps.argocd-token.outputs.token != '' && steps.argocd-token.outcome == 'success'
        env:
          ARGOCD_TOKEN: ${{ steps.argocd-token.outputs.token }}
        run: |
          just ci-argocd-health \
            --environment ${{ inputs.cdk-environment }} \
            --region ${{ env.AWS_REGION }} \
            --max-polls 6 \
            --poll-interval 20

      # -----------------------------------------------------------------------
      # Verify CloudFront Origin Secret Was Injected
      #
      # Runs a kubectl check on the control-plane node via SSM send-command
      # to confirm the Traefik IngressRoute no longer contains the placeholder
      # regex '^PLACEHOLDER_NEVER_MATCHES$'.  A lingering placeholder means
      # deploy.py Step 5 did not persist the secret and CloudFront requests
      # will receive 404s from Traefik.
      #
      # Skipped on Day-0 (no ArgoCD token) because the IngressRoute may not
      # exist yet on a fresh cluster.
      # -----------------------------------------------------------------------
      - name: "Verify CloudFront Origin Secret Injected"
        id: verify-origin-secret
        if: steps.argocd-token.outputs.token != '' && steps.argocd-token.outcome == 'success'
        continue-on-error: false
        run: |
          REGION="${{ env.AWS_REGION }}"
          SSM_PREFIX="/k8s/${{ inputs.cdk-environment }}"

          # Resolve control-plane instance ID (live EC2 tag lookup)
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:k8s:bootstrap-role,Values=control-plane" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --region "$REGION" --output text 2>/dev/null || echo "")

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::warning::Could not resolve control-plane instance — skipping IngressRoute verification"
            exit 0
          fi
          echo "::add-mask::$INSTANCE_ID"

          # Execute kubectl on the control-plane node to read the IngressRoute match rule.
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["sudo kubectl -n nextjs-app get ingressroute nextjs -o jsonpath={.spec.routes[0].match} 2>&1 || echo INGRESSROUTE_NOT_FOUND"]' \
            --region "$REGION" \
            --query "Command.CommandId" --output text 2>/dev/null || echo "")

          if [ -z "$CMD_ID" ]; then
            echo "::warning::Could not send SSM command — skipping IngressRoute verification"
            exit 0
          fi

          echo "Waiting for SSM command $CMD_ID to complete..."
          sleep 12

          MATCH=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardOutputContent" --output text 2>/dev/null || echo "")

          echo "IngressRoute match rule: $MATCH"

          if echo "$MATCH" | grep -q "PLACEHOLDER_NEVER_MATCHES"; then
            echo "::error::IngressRoute still contains the placeholder originSecret."
            echo "::error::deploy.py Step 5 did not persist the CloudFront secret in ArgoCD."
            echo "::error::Check the SSM Automation execution logs for 'FATAL' or 'Verification FAILED'."
            exit 1
          fi

          if echo "$MATCH" | grep -q "INGRESSROUTE_NOT_FOUND"; then
            echo "::warning::IngressRoute 'nextjs' not found in nextjs-app namespace — ArgoCD may not have synced yet"
            exit 0
          fi

          echo "[OK] IngressRoute has a real origin secret — CloudFront routing is active."

      - name: Run K8s Smoke Tests
        id: smoke
        run: |
          SMOKE_CMD="just ci-smoke-kubernetes-infra ${{ inputs.cdk-environment }} --region ${{ env.AWS_REGION }}"
          eval $SMOKE_CMD

      # -----------------------------------------------------------------------
      # Failure Diagnostics — K8s state + boot logs on failure
      # -----------------------------------------------------------------------
      - name: "Capture Failure Diagnostics"
        if: failure()
        continue-on-error: true
        run: |
          echo "## Failure Diagnostics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${{ inputs.environment }} | **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SSM_PREFIX="/k8s/${{ inputs.cdk-environment }}"
          REGION="${{ env.AWS_REGION }}"

          # Resolve control-plane instance ID
          INSTANCE_ID=$(aws ssm get-parameter \
            --name "${SSM_PREFIX}/bootstrap/control-plane-instance-id" \
            --query 'Parameter.Value' --output text \
            --region "$REGION" 2>/dev/null || echo "")

          if [ -n "$INSTANCE_ID" ]; then
            # Mask instance ID to prevent infrastructure enumeration
            echo "::add-mask::$INSTANCE_ID"

            echo "### K8s Pod Status (non-Running)" >> $GITHUB_STEP_SUMMARY
            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["sudo kubectl get pods -A --field-selector=status.phase!=Running -o wide 2>/dev/null || echo No kubectl access"]' \
              --query 'Command.CommandId' --output text \
              --region "$REGION" 2>/dev/null || echo "")
            if [ -n "$CMD_ID" ]; then
              sleep 10
              POD_OUTPUT=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                --query 'StandardOutputContent' --output text \
                --region "$REGION" 2>/dev/null || echo "Could not retrieve")
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$POD_OUTPUT" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "_Could not resolve instance ID from SSM — skipping K8s diagnostics_" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "Fetch Boot Logs from CloudWatch"
        if: failure()
        continue-on-error: true
        run: just ci-fetch-boot-logs ${{ inputs.cdk-environment }} --region ${{ env.AWS_REGION }}
