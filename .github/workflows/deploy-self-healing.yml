# @format
# @description Deploy Self-Healing Pipeline to Development
#
# Deploys the 2-stack Self-Healing architecture in dependency order:
#   1. SelfHealing-Gateway  — AgentCore Gateway (MCP tool server for Lambda tools)
#   2. SelfHealing-Agent    — Bedrock ConverseCommand agent Lambda (MCP client)
#
# The Gateway must deploy first as the Agent stack consumes its URL via SSM.
# Both stacks use the official @aws-cdk/aws-bedrock-agentcore-alpha L2 constructs.

name: Deploy Self-Healing (Dev)

on:
  workflow_dispatch: # Manual trigger
  # push:
  #   branches: [develop]
  #   paths:
  #     - "infra/lib/stacks/self-healing/**"
  #     - "infra/lib/config/self-healing/**"
  #     - "infra/lib/projects/self-healing/**"
  #     - "infra/lambda/self-healing/**"
  #     - "infra/bin/app.ts"
  #     - ".github/workflows/deploy-self-healing.yml"
  #     - ".github/workflows/_deploy-stack.yml"
  #     - ".github/actions/**"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-self-healing-development
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Stack 1: Gateway (AgentCore Gateway — MCP tool server)
  #
  # Creates the AgentCore Gateway with Cognito M2M auth and registers
  # Lambda functions as MCP-compatible tools. Exports URL/ID via SSM
  # for the Agent stack to consume.
  # ===========================================================================
  deploy-gateway:
    name: Deploy Gateway Stack
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: SelfHealing-Gateway-development
      project: self-healing
      environment: development
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
      use-container: false # AgentCore L2 may require Docker for asset bundling
      notification-email: ${{ secrets.NOTIFICATION_EMAIL }}
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Stack 2: Agent (Bedrock ConverseCommand Lambda — MCP client)
  #
  # Depends on: Gateway (consumes gateway URL from SSM parameter)
  #
  # Creates the agent Lambda, EventBridge rules for alarm-driven
  # triggers, dead-letter queue, and CloudWatch metric filters for
  # token usage monitoring (FinOps guardrail).
  # ===========================================================================
  deploy-agent:
    name: Deploy Agent Stack
    needs: [deploy-gateway]
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: SelfHealing-Agent-development
      project: self-healing
      environment: development
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
      use-container: false
      notification-email: ${{ secrets.NOTIFICATION_EMAIL }}
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}
