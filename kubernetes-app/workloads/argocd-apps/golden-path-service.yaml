# @format
# ArgoCD Application: Golden Path Service — Crossplane-Managed Resources
#
# Deploys the golden-path-service Helm chart, which includes:
#   - Crossplane Claims (EncryptedBucket, MonitoredQueue)
#   - Application Deployment, Service, NetworkPolicy
#   - Optional Ingress and ServiceMonitor
#
# This is the first workload to use Crossplane for AWS resource provisioning,
# proving the golden-path model (XRD Claims → Compositions → AWS Resources).
#
# Sync wave 5: Business Apps — deploys after Platform Tooling (wave 4)
# so Crossplane providers and XRDs are guaranteed to be ready.
#
# Note: The Deployment and Service templates require a container image.
# Set image.repository in values to deploy the application container.
# Crossplane Claims work independently of the application Deployment.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: golden-path-service
  annotations:
    kubernetes.io/description: "Golden-path service with Crossplane-managed AWS resources"
    argocd.argoproj.io/sync-wave: "7"  # Wave 7: After XRDs (wave 6) register EncryptedBucket/MonitoredQueue CRDs
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
    platform.engineering/component: golden-path
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Points to this same repo — monorepo pattern
    repoURL: git@github.com:Nelson-Lamounier/cdk-monitoring.git
    targetRevision: develop
    path: kubernetes-app/workloads/charts/golden-path-service/chart

  destination:
    server: https://kubernetes.default.svc
    namespace: golden-path

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
