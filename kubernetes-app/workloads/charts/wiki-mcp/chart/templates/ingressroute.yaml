{{/*
@format
wiki-mcp — Traefik IngressRoute + Middlewares

Exposes the FastMCP server at: https://ops.nelsonlamounier.com/wiki-mcp
MCP endpoint:  POST https://ops.nelsonlamounier.com/wiki-mcp/mcp
Health check:  GET  https://ops.nelsonlamounier.com/wiki-mcp/healthz

Middleware chain (applied in order by Traefik):
  1. wiki-mcp-basicauth  — verifies Authorization: Basic header
  2. wiki-mcp-stripprefix — strips /wiki-mcp before forwarding to pod

BasicAuth Secret — NOT managed by ArgoCD (contains htpasswd hash):
  Create once:
    kubectl create secret generic wiki-mcp-basicauth \
      --from-literal=users="$(htpasswd -nb mcp <password>)" \
      -n wiki-mcp

  Lambda env vars:
    WIKI_MCP_URL=https://ops.nelsonlamounier.com/wiki-mcp/mcp
    WIKI_MCP_AUTH=<Basic base64(mcp:<password>)>
    (store in SSM Parameter Store: /wiki-mcp/basicauth-header)

Priority 90: below monitoring IngressRoutes (priority 100), above default catch-all.
*/}}

{{- if .Values.ingress.enabled }}
# =========================================================================
# Middleware 1 — BasicAuth (credentials from K8s Secret)
# =========================================================================
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wiki-mcp-basicauth
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  basicAuth:
    secret: wiki-mcp-basicauth   # K8s Secret created manually (htpasswd format)

---
# =========================================================================
# Middleware 2 — StripPrefix (removes /wiki-mcp before forwarding)
# =========================================================================
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wiki-mcp-stripprefix
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  stripPrefix:
    prefixes:
      - {{ .Values.ingress.pathPrefix | quote }}

---
# =========================================================================
# IngressRoute
# =========================================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    kubernetes.io/description: "IngressRoute for wiki-mcp FastMCP server"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.ingress.pathPrefix }}`)
      kind: Rule
      priority: {{ .Values.ingress.priority }}
      middlewares:
        - name: wiki-mcp-basicauth
          namespace: {{ .Release.Namespace }}
        - name: wiki-mcp-stripprefix
          namespace: {{ .Release.Namespace }}
      services:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
  tls: {}
{{- end }}
