# @format
# wiki-mcp — Development environment overrides
#
# Applied by ArgoCD on top of chart/values.yaml.
# No sensitive values — those come from the wiki-mcp-config ConfigMap
# (created by deploy.py or kubectl) and wiki-mcp-basicauth Secret (manual).

image:
  repository: 771826808455.dkr.ecr.eu-west-1.amazonaws.com/wiki-mcp
  # tag: intentionally omitted — ArgoCD Image Updater writes to
  #      chart/.argocd-source-wiki-mcp.yaml on every CI push.

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

ingress:
  enabled: true
  host: "ops.nelsonlamounier.com"
  pathPrefix: "/wiki-mcp"
  priority: 90
