# @format
# Default values for the nextjs-app Helm chart.
# Override per-environment via nextjs-values.yaml.

namespace: nextjs-app

# ---------------------------------------------------------------------------
# Application Image
# ---------------------------------------------------------------------------
image:
  repository: "" # Overridden at deploy time via --set image.repository=<ECR_URI>
  tag: latest
  pullPolicy: Always

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
replicas: 2
port: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Security context for the pod
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

# Security context for the container
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false # Next.js needs writable .next/cache

# ---------------------------------------------------------------------------
# Node Placement
# ---------------------------------------------------------------------------
nodeSelector:
  workload: frontend

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 3000

# ---------------------------------------------------------------------------
# Health Probes
# ---------------------------------------------------------------------------
probes:
  readiness:
    path: /api/health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    path: /api/health
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Horizontal Pod Autoscaler
# ---------------------------------------------------------------------------
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilization: 70

# ---------------------------------------------------------------------------
# Ingress (Traefik IngressRoute CRD)
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  # Match all hosts — CloudFront handles domain routing
  matchRule: "PathPrefix(`/`)"

# ---------------------------------------------------------------------------
# Secrets (injected via deploy.py → Kubernetes Secret)
# ---------------------------------------------------------------------------
secrets:
  name: nextjs-secrets

# ---------------------------------------------------------------------------
# Resource Quota (namespace-level limits)
# ---------------------------------------------------------------------------
resourceQuota:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    persistentvolumeclaims: "2"

# ---------------------------------------------------------------------------
# OpenTelemetry (OTel) — Tracing Configuration
# ---------------------------------------------------------------------------
# The Docker image ships with OTEL_SDK_DISABLED=true by default.
# These K8s env overrides enable the OTel SDK at runtime so spans
# flow to Tempo without requiring a new Docker build.
otel:
  enabled: true
  endpoint: "http://tempo.monitoring.svc.cluster.local:4317"
  serviceName: "nextjs-frontend"

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: true
  # VPC CIDR for allowing hostNetwork pod traffic (e.g., Traefik).
  # Required because hostNetwork pods send traffic from node IPs,
  # which Calico cannot match via namespaceSelector.
  nodesCidr: "10.0.0.0/16"
  # Pod CIDR for VXLAN tunnel addresses.
  # Cross-node traffic through Calico VXLAN uses tunnel endpoint IPs
  # (e.g., 192.168.28.2) as source, which are in the pod CIDR range.
  podCidr: "192.168.0.0/16"

# ---------------------------------------------------------------------------
# Argo Rollouts — Canary Strategy Configuration
# ---------------------------------------------------------------------------
# Progressive delivery: traffic shifts gradually from stable → canary.
# At each pause, a Prometheus AnalysisRun validates error rate and latency.
# If thresholds are breached, the rollout auto-aborts to stable.
rollout:
  steps:
    firstWeight: 20         # Step 1: 20% traffic to canary
    firstPauseDuration: 60s # Pause 60s for analysis
    secondWeight: 50        # Step 2: 50% traffic to canary
    secondPauseDuration: 60s # Pause 60s for analysis
    # Step 3: implicit 100% — full promotion
  maxSurge: "25%"
  maxUnavailable: 0
  analysis:
    interval: 60s            # Run analysis every 60s during pause
    count: 3                 # Require 3 consecutive measurements
    failureLimit: 1          # Abort after 1 failed measurement
    consecutiveErrorLimit: 5 # Tolerate Prometheus being unreachable
    errorRateThreshold: 0.05 # Max 5% error rate
    latencyThresholdMs: 2000 # Max 2000ms P95 latency

