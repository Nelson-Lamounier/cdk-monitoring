# @format
# Default values for the nextjs-app Helm chart.
# Override per-environment via nextjs-values.yaml.

namespace: nextjs-app

# ---------------------------------------------------------------------------
# Application Image
# ---------------------------------------------------------------------------
image:
  repository: "" # Overridden at deploy time via --set image.repository=<ECR_URI>
  tag: "" # Overridden by nextjs-values.yaml or ArgoCD Image Updater write-back
  pullPolicy: Always

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
replicas: 2
port: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Security context for the pod
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

# Security context for the container
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false # Next.js ISR writes to /app/.next/server at runtime; emptyDir there clobbers build output

# ---------------------------------------------------------------------------
# Node Placement
# ---------------------------------------------------------------------------
nodeSelector:
  node-pool: general

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 3000

# ---------------------------------------------------------------------------
# Health Probes
# ---------------------------------------------------------------------------
probes:
  readiness:
    path: /api/health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    path: /api/health
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Horizontal Pod Autoscaler
# ---------------------------------------------------------------------------
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilization: 70

# ---------------------------------------------------------------------------
# PodDisruptionBudget
# ---------------------------------------------------------------------------
pdb:
  enabled: true
  minAvailable: 1

# ---------------------------------------------------------------------------
# Ingress (Traefik IngressRoute CRD)
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  # Public domain — injected by deploy.py via ArgoCD helm parameter override.
  # When set, the IngressRoute adds Host() to the match rule for defence-in-depth.
  # CloudFront forwards the original Host header via the origin request policy.
  host: ""  # Populated by deploy.py — do not set manually
  # Path matching — CloudFront handles domain routing
  matchRule: "PathPrefix(`/`)"

# ---------------------------------------------------------------------------
# Secrets (injected via deploy.py → Kubernetes Secret)
# ---------------------------------------------------------------------------
secrets:
  name: nextjs-secrets

# ---------------------------------------------------------------------------
# CloudFront Security
# ---------------------------------------------------------------------------
# originSecret is injected at deploy time by deploy.py (Step 5), which reads
# /k8s/{env}/cloudfront-origin-secret from SSM and patches the ArgoCD
# Application via custom_api.patch_namespaced_custom_object.
#
# The IngressRoute uses HeaderRegexp (Traefik v3), which accepts a Go regex pattern.
# During secret rotation, deploy.py temporarily sets this to "OLD|NEW"
# so Traefik accepts both values while CloudFront propagates (~15 min).
# After propagation completes, it is set back to "NEW" only.
#
# IMPORTANT: The default is a regex that never matches a real 64-char hex secret.
# This ensures the route blocks ALL direct-to-origin traffic until deploy.py
# injects the actual secret. An empty string "" would cause Traefik v3 to
# reject the route entirely (empty regex is invalid).
cloudfront:
  originSecret: "^PLACEHOLDER_NEVER_MATCHES$"  # Overridden by deploy.py at runtime

# ---------------------------------------------------------------------------
# Resource Quota (namespace-level limits)
# ---------------------------------------------------------------------------
# Sized for blue/green: 2x replicas running simultaneously + headroom.
# Formula: (replicas × 2 × per-pod limit) × 1.5 safety margin
resourceQuota:
  hard:
    requests.cpu: "1500m"
    requests.memory: 1536Mi
    limits.cpu: "3"
    limits.memory: 3Gi
    persistentvolumeclaims: "2"

# ---------------------------------------------------------------------------
# OpenTelemetry (OTel) — Tracing Configuration
# ---------------------------------------------------------------------------
otel:
  enabled: true
  endpoint: "http://tempo.monitoring.svc.cluster.local:4317"
  serviceName: "nextjs-frontend"

# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: true
  nodesCidr: "10.0.0.0/16"
  podCidr: "192.168.0.0/16"

# ---------------------------------------------------------------------------
# Argo Rollouts — Blue/Green Strategy Configuration
# ---------------------------------------------------------------------------
# Both active and preview ReplicaSets run simultaneously.
# Pre-promotion analysis validates the preview against Prometheus
# metrics before traffic switches.
rollout:
  blueGreen:
    autoPromotionEnabled: false   # Require manual promotion (or ArgoCD sync)
    autoPromotionSeconds: 120     # Auto-promote after 120s if auto is enabled
    scaleDownDelaySeconds: 30     # Wait 30s before scaling down old RS
  analysis:
    interval: 60s
    count: 3
    failureLimit: 1
    consecutiveErrorLimit: 5
    errorRateThreshold: 0.05
    latencyThresholdMs: 2000
