# ---------------------------------------------------------------
# Canary Analysis Template — Prometheus metric validation
#
# Runs during each canary pause step. Queries Prometheus for:
#   1. Error rate (5xx / total requests) — must be below threshold
#   2. P95 latency — must be below threshold
#
# If either metric breaches its threshold, the AnalysisRun fails
# and the Rollout auto-aborts, rolling back to the stable revision.
#
# Metrics come from Tempo's span-metrics (traces_spanmetrics_*)
# which are scraped by Prometheus.
# ---------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: nextjs-canary-analysis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nextjs.fullLabels" . | nindent 4 }}
spec:
  args:
    - name: service-name
  metrics:
    # ----- Error Rate: 5xx errors / total requests -----
    - name: error-rate
      interval: {{ .Values.rollout.analysis.interval }}
      count: {{ .Values.rollout.analysis.count }}
      failureLimit: {{ .Values.rollout.analysis.failureLimit }}
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(
              traces_spanmetrics_calls_total{
                service_name="{{`{{args.service-name}}`}}",
                status_code="STATUS_CODE_ERROR"
              }[5m]
            )) /
            sum(rate(
              traces_spanmetrics_calls_total{
                service_name="{{`{{args.service-name}}`}}"
              }[5m]
            ))
      successCondition: "isNaN(result) || result < {{ .Values.rollout.analysis.errorRateThreshold }}"
    # ----- P95 Latency: 95th percentile response time -----
    - name: p95-latency
      interval: {{ .Values.rollout.analysis.interval }}
      count: {{ .Values.rollout.analysis.count }}
      failureLimit: {{ .Values.rollout.analysis.failureLimit }}
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            histogram_quantile(0.95,
              sum(rate(
                traces_spanmetrics_duration_milliseconds_bucket{
                  service_name="{{`{{args.service-name}}`}}"
                }[5m]
              )) by (le)
            )
      successCondition: "isNaN(result) || result < {{ .Values.rollout.analysis.latencyThresholdMs }}"
