# @format
# Development environment overrides — lower resources, single replica.

image:
  repository: 771826808455.dkr.ecr.eu-west-1.amazonaws.com/nextjs-frontend
  tag: "2d6bf10bfa8e796122b30f139b677ab43e906bd9"

replicas: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilization: 80

resourceQuota:
  hard:
    requests.cpu: "750m"
    requests.memory: 768Mi
    limits.cpu: "1500m"
    limits.memory: 1536Mi
    persistentvolumeclaims: "1"

pdb:
  enabled: true
