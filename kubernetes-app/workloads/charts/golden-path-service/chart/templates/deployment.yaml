{{/*
@format
Golden Path Service — Deployment + Service + PodDisruptionBudget

Core workload resources with:
- Three-probe health check model (startup, readiness, liveness)
- Graceful shutdown with preStop hook
- Resource limits sized for t3.medium workers
- PodDisruptionBudget for availability during rolling updates
*/}}

# =========================================================================
# DEPLOYMENT
# =========================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    platform.engineering/source: golden-path
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
        platform.engineering/source: golden-path
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          # -----------------------------------------------------------
          # Health Checks — Three-probe model
          # -----------------------------------------------------------
          startupProbe:
            httpGet:
              path: {{ .Values.healthChecks.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthChecks.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthChecks.startup.periodSeconds }}
            failureThreshold: {{ .Values.healthChecks.startup.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthChecks.readiness.path }}
              port: http
            periodSeconds: {{ .Values.healthChecks.readiness.periodSeconds }}
            failureThreshold: {{ .Values.healthChecks.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthChecks.liveness.path }}
              port: http
            periodSeconds: {{ .Values.healthChecks.liveness.periodSeconds }}
            failureThreshold: {{ .Values.healthChecks.liveness.failureThreshold }}

          # -----------------------------------------------------------
          # Resources — Sized for t3.medium workers
          # -----------------------------------------------------------
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # -----------------------------------------------------------
          # Environment Variables
          # -----------------------------------------------------------
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          # -----------------------------------------------------------
          # Graceful shutdown — drain connections before SIGTERM
          # -----------------------------------------------------------
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
# =========================================================================
# SERVICE
# =========================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}

---
# =========================================================================
# POD DISRUPTION BUDGET
# =========================================================================
{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
{{- end }}
