{{/*
@format
Golden Path Service — Traefik IngressRoute

Exposes the service via Traefik with TLS termination.
Only created when ingress.enabled is true.

Requires:
- Traefik deployed (sync-wave 2)
- cert-manager + ClusterIssuer (sync-wave 1)
*/}}

{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    kubernetes.io/description: "IngressRoute for {{ .Release.Name }}"
spec:
  entryPoints:
    {{- toYaml .Values.ingress.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.ingress.pathPrefix }}`)
      kind: Rule
      services:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
  tls:
    certResolver: {{ .Values.ingress.tls.certResolver }}
{{- end }}
