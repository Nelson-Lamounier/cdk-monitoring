{{- if .Values.grafana.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring.fullLabels" "grafana" | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - match: {{ .Values.grafana.ingress.matchRule }}
      kind: Rule
      priority: 100
      middlewares:
        - name: grafana-stripprefix
          namespace: {{ .Values.namespace }}
      services:
        - name: grafana
          port: {{ .Values.grafana.service.port }}
{{- end }}
