      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["tracing", "dynamodb", "tempo", "opentelemetry"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
