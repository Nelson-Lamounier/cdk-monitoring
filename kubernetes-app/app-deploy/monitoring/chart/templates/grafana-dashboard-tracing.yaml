apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-tracing
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "grafana" | nindent 4 }}
data:
  dynamodb-tracing.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 2,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "DynamoDB Request Metrics",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "legend": { "calcs": ["rate"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "exemplar": true,
              "expr": "sum by (db_operation) (rate(traces_spanmetrics_calls_total{db_system=\"dynamodb\"}[5m]))",
              "legendFormat": "{{ "{{db_operation}}" }}",
              "refId": "A"
            }
          ],
          "title": "DynamoDB Operations / sec",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 2,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "exemplar": true,
              "expr": "histogram_quantile(0.50, sum by (le, db_operation) (rate(traces_spanmetrics_duration_seconds_bucket{db_system=\"dynamodb\"}[5m])))",
              "legendFormat": "p50 {{ "{{db_operation}}" }}",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "exemplar": true,
              "expr": "histogram_quantile(0.95, sum by (le, db_operation) (rate(traces_spanmetrics_duration_seconds_bucket{db_system=\"dynamodb\"}[5m])))",
              "legendFormat": "p95 {{ "{{db_operation}}" }}",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "exemplar": true,
              "expr": "histogram_quantile(0.99, sum by (le, db_operation) (rate(traces_spanmetrics_duration_seconds_bucket{db_system=\"dynamodb\"}[5m])))",
              "legendFormat": "p99 {{ "{{db_operation}}" }}",
              "refId": "C"
            }
          ],
          "title": "DynamoDB Latency (P50 / P95 / P99)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 8, "x": 0, "y": 9 },
          "id": 3,
          "options": {
            "colorMode": "background_gradient",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showPercentChange": true,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "(sum(rate(traces_spanmetrics_calls_total{db_system=\"dynamodb\",status_code=\"STATUS_CODE_ERROR\"}[5m])) / sum(rate(traces_spanmetrics_calls_total{db_system=\"dynamodb\"}[5m]))) * 100",
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ],
          "title": "DynamoDB Error Rate",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 8, "x": 8, "y": 9 },
          "id": 4,
          "options": {
            "colorMode": "background_gradient",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showPercentChange": true,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "sum(rate(traces_spanmetrics_calls_total{db_system=\"dynamodb\"}[5m]))",
              "legendFormat": "Total Throughput",
              "refId": "A"
            }
          ],
          "title": "DynamoDB Total Throughput",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "red", "value": 1 }
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 9 },
          "id": 5,
          "options": {
            "colorMode": "background_gradient",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showPercentChange": true,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "histogram_quantile(0.95, sum by (le) (rate(traces_spanmetrics_duration_seconds_bucket{db_system=\"dynamodb\"}[5m])))",
              "legendFormat": "P95 Latency",
              "refId": "A"
            }
          ],
          "title": "DynamoDB P95 Latency",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 200,
          "title": "Service Graph (Request Flow)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "id": 6,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "exemplar": true,
              "expr": "sum by (client, server) (rate(traces_service_graph_request_total[5m]))",
              "legendFormat": "{{ "{{client}}" }} → {{ "{{server}}" }}",
              "refId": "A"
            }
          ],
          "title": "Service-to-Service Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "id": 7,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "exemplar": true,
              "expr": "sum by (client, server) (rate(traces_service_graph_request_failed_total[5m]))",
              "legendFormat": "{{ "{{client}}" }} → {{ "{{server}}" }} (failed)",
              "refId": "A"
            }
          ],
          "title": "Service-to-Service Failed Requests",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 300,
          "title": "Next.js Application Traces",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "id": 8,
          "options": {
            "legend": { "calcs": ["rate"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "exemplar": true,
              "expr": "sum by (http_route) (rate(traces_spanmetrics_calls_total{service_name=~\".*nextjs.*|.*next.*\"}[5m]))",
              "legendFormat": "{{ "{{http_route}}" }}",
              "refId": "A"
            }
          ],
          "title": "Next.js Requests by Route",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "id": 9,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "exemplar": true,
              "expr": "histogram_quantile(0.95, sum by (le, http_route) (rate(traces_spanmetrics_duration_seconds_bucket{service_name=~\".*nextjs.*|.*next.*\"}[5m])))",
              "legendFormat": "p95 {{ "{{http_route}}" }}",
              "refId": "A"
            }
          ],
          "title": "Next.js Route Latency (P95)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "drawStyle": "bars",
                "fillOpacity": 80,
                "gradientMode": "scheme",
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 32 },
          "id": 10,
          "options": {
            "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "exemplar": true,
              "expr": "sum by (http_status_code) (rate(traces_spanmetrics_calls_total{service_name=~\".*nextjs.*|.*next.*\"}[5m]))",
              "legendFormat": "{{ "{{http_status_code}}" }}",
              "refId": "A"
            }
          ],
          "title": "Next.js Response Codes",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 32 },
          "id": 11,
          "options": {
            "colorMode": "background_gradient",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showPercentChange": true,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "(sum(rate(traces_spanmetrics_calls_total{service_name=~\".*nextjs.*|.*next.*\",status_code=\"STATUS_CODE_ERROR\"}[5m])) / sum(rate(traces_spanmetrics_calls_total{service_name=~\".*nextjs.*|.*next.*\"}[5m]))) * 100",
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ],
          "title": "Next.js Error Rate",
          "type": "stat"
