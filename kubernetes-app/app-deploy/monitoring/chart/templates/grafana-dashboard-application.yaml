apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-application
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "grafana" | nindent 4 }}
data:
  application-monitoring.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Next.js Application",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background_gradient",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "kube_deployment_status_replicas_available{namespace=\"nextjs-app\",deployment=\"nextjs\"}",
              "legendFormat": "Available",
              "refId": "A"
            }
          ],
          "title": "Next.js Replicas",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background_gradient",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"nextjs-app\",container=\"nextjs\"})",
              "legendFormat": "Total Restarts",
              "refId": "A"
            }
          ],
          "title": "Next.js Container Restarts",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "percent",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 12, "x": 12, "y": 1 },
          "id": 3,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"nextjs-app\",container=\"nextjs\"}[5m]) * 100",
              "legendFormat": "Next.js Pod",
              "refId": "A"
            }
          ],
          "title": "Next.js CPU Usage",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 6 },
          "id": 4,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "container_memory_working_set_bytes{namespace=\"nextjs-app\",container=\"nextjs\"}",
              "legendFormat": "Next.js Pod",
              "refId": "A"
            }
          ],
          "title": "Next.js Memory Usage",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 13 },
          "id": 200,
          "title": "Monitoring Stack Health",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "red", "text": "DOWN" }, "1": { "color": "green", "text": "UP" } }, "type": "value" }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 14 },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "up{job=\"prometheus\"}",
              "legendFormat": "Prometheus",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "up{job=\"grafana\"}",
              "legendFormat": "Grafana",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "up{job=\"loki\"}",
              "legendFormat": "Loki",
              "refId": "C"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "up{job=\"tempo\"}",
              "legendFormat": "Tempo",
              "refId": "D"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "up{job=\"node-exporter\"}",
              "legendFormat": "Node Exporter",
              "refId": "E"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "up{job=\"kube-state-metrics\"}",
              "legendFormat": "Kube State Metrics",
              "refId": "F"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "up{job=\"traefik\"}",
              "legendFormat": "Traefik",
              "refId": "G"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "up{job=\"nextjs-app\"}",
              "legendFormat": "Next.js App",
              "refId": "H"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "up{job=\"github-actions-exporter\"}",
              "legendFormat": "GitHub Actions Exporter",
              "refId": "I"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "up{job=\"kubernetes-nodes\"}",
              "legendFormat": "Kubelet",
              "refId": "J"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "up{job=\"kubernetes-cadvisor\"}",
              "legendFormat": "cAdvisor",
              "refId": "K"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "up{job=\"kubernetes-service-endpoints\"}",
              "legendFormat": "K8s Service Endpoints",
              "refId": "L"
            }
          ],
          "title": "Scrape Targets",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 14 },
          "id": 6,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "process_resident_memory_bytes{job=\"prometheus\"}",
              "legendFormat": "Prometheus RSS",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "process_resident_memory_bytes{job=\"loki\"}",
              "legendFormat": "Loki RSS",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "process_resident_memory_bytes{job=\"grafana\"}",
              "legendFormat": "Grafana RSS",
              "refId": "C"
            }
          ],
          "title": "Monitoring Stack Memory",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 20 },
          "id": 7,
          "options": {
            "colorMode": "background_gradient",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "prometheus_tsdb_head_series",
              "legendFormat": "Active Series",
              "refId": "A"
            }
          ],
          "title": "Prometheus Active Series",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "decbytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 20 },
          "id": 8,
          "options": {
            "colorMode": "background_gradient",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "prometheus_tsdb_head_chunks_storage_size_bytes",
              "legendFormat": "TSDB Size",
              "refId": "A"
            }
          ],
          "title": "Prometheus TSDB Size",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 12, "x": 12, "y": 20 },
          "id": 9,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "rate(prometheus_target_interval_length_seconds_sum[5m]) / rate(prometheus_target_interval_length_seconds_count[5m])",
              "legendFormat": "Avg Scrape Duration",
              "refId": "A"
            }
          ],
          "title": "Prometheus Scrape Duration",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 25 },
          "id": 300,
          "title": "CI/CD Pipeline",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "drawStyle": "bars",
                "fillOpacity": 80,
                "gradientMode": "scheme",
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 26 },
          "id": 10,
          "options": {
            "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "increase(github_workflow_usage_seconds_total[24h])",
              "legendFormat": "{{ "{{workflow}}" }}",
              "refId": "A"
            }
          ],
          "title": "GitHub Workflow Usage (24h)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 6, "x": 12, "y": 26 },
          "id": 11,
          "options": {
            "colorMode": "background_gradient",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "count(github_runner_status == 1)",
              "legendFormat": "Online",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "count(github_runner_status == 0)",
              "legendFormat": "Offline",
              "refId": "B"
            }
          ],
          "title": "GitHub Runner Status",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 6, "x": 18, "y": 26 },
          "id": 12,
          "options": {
            "colorMode": "background_gradient",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "" },
              "expr": "sum(increase(github_workflow_usage_seconds_total[7d])) / 60",
              "legendFormat": "Minutes Used",
              "refId": "A"
            }
          ],
          "title": "CI Minutes Used (7d)",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["application", "nextjs", "monitoring", "cicd"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Application & Monitoring",
      "uid": "app-monitoring",
      "version": 1
    }
