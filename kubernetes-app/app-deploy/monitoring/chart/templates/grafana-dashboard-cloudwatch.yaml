apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-cloudwatch
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "grafana" | nindent 4 }}
data:
  aws-logs.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Lambda Function Logs",
          "type": "row"
        },
        {
          "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
              "expression": "fields @timestamp, @message, @logStream | sort @timestamp desc | limit 100",
              "id": "",
              "logGroups": [
                { "arn": "", "name": "/aws/lambda/*-dns-*" }
              ],
              "queryMode": "Logs",
              "refId": "A",
              "region": "eu-west-1",
              "statsGroups": []
            }
          ],
          "title": "DNS Lambda Logs",
          "type": "logs"
        },
