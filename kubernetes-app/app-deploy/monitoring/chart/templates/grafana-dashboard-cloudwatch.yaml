          "id": 400,
          "title": "VPC Flow Logs",
          "type": "row"
        },
        {
          "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 36 },
          "id": 8,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
              "expression": "fields @timestamp, srcAddr, dstAddr, srcPort, dstPort, protocol, packets, bytes, action, logStatus | filter action = 'REJECT' | sort @timestamp desc | limit 200",
              "id": "",
              "logGroups": [
                { "arn": "", "name": "/vpc/*/flow-logs" }
              ],
              "queryMode": "Logs",
              "refId": "A",
              "region": "eu-west-1",
              "statsGroups": []
            }
          ],
          "title": "VPC Flow Logs (Rejected Traffic)",
          "type": "logs"
        },
        {
          "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "drawStyle": "bars",
                "fillOpacity": 80,
                "gradientMode": "scheme",
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 44 },
          "id": 9,
          "options": {
            "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "cloudwatch", "uid": "cloudwatch" },
              "expression": "stats count(*) as rejectedCount by bin(5m) | filter action = 'REJECT'",
              "id": "",
              "logGroups": [
                { "arn": "", "name": "/vpc/*/flow-logs" }
              ],
              "queryMode": "Logs",
              "refId": "A",
              "region": "eu-west-1",
              "statsGroups": ["bin(5m)"]
            }
          ],
          "title": "Rejected Traffic Over Time",
          "type": "timeseries"
        }
