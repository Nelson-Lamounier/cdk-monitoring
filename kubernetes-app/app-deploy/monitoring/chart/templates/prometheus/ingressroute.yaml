{{- if .Values.prometheus.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring.fullLabels" "prometheus" | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - match: {{ .Values.prometheus.ingress.matchRule }}
      kind: Rule
      priority: 100
      services:
        - name: prometheus
          port: 9090
{{- end }}
