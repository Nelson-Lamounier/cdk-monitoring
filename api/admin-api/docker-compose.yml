# @format
# admin-api — Docker Compose for local development testing
#
# Mounts ~/.aws so the AWS SDK resolves credentials from your local profile.
# No credentials are baked into the image.
#
# Usage:
#   docker compose up --build   # Build image and start
#   docker compose up           # Start with cached image
#   docker compose down         # Stop and remove container
#
# Or via justfile:
#   just admin-api-up           # Build + start in detached mode
#   just admin-api-down         # Stop and tear down
#   just admin-api-logs         # Tail logs

services:
  admin-api:
    build:
      context: ../..          # Repo root — Dockerfile copies workspace packages
      dockerfile: api/admin-api/Dockerfile
    # EC2 worker nodes are x86_64. Force amd64 so Apple Silicon builds produce
    # a runnable image for the cluster (local dev only; CI runs on ubuntu-latest).
    platform: linux/amd64
    image: admin-api:local
    ports:
      - "3002:3002"
    env_file:
      # All non-sensitive infra refs (ARNs, table names, bucket name)
      # Sensitive Cognito vars (COGNITO_USER_POOL_ID etc.) must also be set here
      - .env
    environment:
      # AWS credential passthrough — NEVER set these in production K8s manifests.
      # In K8s, credentials come from the EC2 Instance Profile (IMDS).
      # Locally, we pass the named profile so the SDK can resolve from ~/.aws.
      - AWS_PROFILE=${AWS_PROFILE:-dev-account}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-eu-west-1}
      - AWS_REGION=${AWS_REGION:-eu-west-1}
    volumes:
      # Mount local AWS credentials read-only.
      # Path inside container matches the home dir of the adminapi user (uid 1001).
      - ${HOME}/.aws:/home/adminapi/.aws:ro
      # Writable /tmp for Node.js temp ops (read-only root fs is enforced in K8s)
      - tmp:/tmp
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--output-document=-", "http://localhost:3002/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  tmp:
